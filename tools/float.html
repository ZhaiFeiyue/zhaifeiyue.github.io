<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Float Toy — IEEE 754 Floating Point Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --bg-card: #181a24;
  --bg-card-hover: #1e2030;
  --border: #2a2d3e;
  --border-active: #4a4d6e;
  --text: #e2e4f0;
  --text-dim: #8b8fa8;
  --text-muted: #565a72;

  --sign-bg: #2d2654;
  --sign-fg: #b4a0ff;
  --sign-hover: #3d3474;
  --sign-border: #6b5ad4;
  --sign-badge: #7c6ae0;

  --exp-bg: #1e3a2a;
  --exp-fg: #7de8a0;
  --exp-hover: #285a3a;
  --exp-border: #3cb06a;
  --exp-badge: #4ac87a;

  --frac-bg: #3a1e24;
  --frac-fg: #ff9898;
  --frac-hover: #5a2834;
  --frac-border: #c05060;
  --frac-badge: #e0606e;

  --accent: #6c8aff;
  --accent-hover: #8aa4ff;
  --preset-bg: #1c1e2e;
  --preset-hover: #282a40;
  --input-bg: #12141e;
  --scrollbar-thumb: #2a2d3e;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

.app-layout {
  display: flex;
  min-height: 100vh;
}

/* --- Sidebar --- */
.sidebar {
  position: fixed;
  top: 0;
  left: 0;
  width: 220px;
  height: 100vh;
  background: var(--bg-card);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 100;
  overflow-y: auto;
}

.sidebar-header {
  padding: 24px 20px 16px;
  border-bottom: 1px solid var(--border);
}

.sidebar-header h1 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--sign-fg), var(--exp-fg), var(--frac-fg));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.sidebar-header .subtitle {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
}

.sidebar-nav {
  padding: 12px 8px;
  flex: 1;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s ease;
  color: var(--text-dim);
  font-size: 13px;
  font-weight: 500;
  text-decoration: none;
  user-select: none;
}

.nav-item:hover {
  background: var(--bg-card-hover);
  color: var(--text);
}

.nav-item.active {
  background: rgba(108, 138, 255, 0.1);
  color: var(--accent);
}

.nav-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  background: var(--border);
  color: var(--text-dim);
  margin-left: auto;
}

.sidebar-legend {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
}

.legend-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-muted);
  margin-bottom: 10px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 6px;
}

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 3px;
  flex-shrink: 0;
}

.legend-dot.sign { background: var(--sign-badge); }
.legend-dot.exponent { background: var(--exp-badge); }
.legend-dot.fraction { background: var(--frac-badge); }

/* --- Main content --- */
.main-content {
  margin-left: 220px;
  flex: 1;
  padding: 32px 40px 80px;
  max-width: 1200px;
}

.main-header {
  margin-bottom: 36px;
}

.main-header p {
  color: var(--text-dim);
  font-size: 14px;
  max-width: 700px;
  line-height: 1.7;
}

.main-header p a {
  color: var(--accent);
  text-decoration: none;
}

.main-header p a:hover {
  text-decoration: underline;
}

/* --- Format Cards --- */
.format-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  margin-bottom: 24px;
  transition: border-color 0.2s ease;
  overflow: hidden;
  scroll-margin-top: 20px;
}

.format-card:hover {
  border-color: var(--border-active);
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 24px;
  border-bottom: 1px solid var(--border);
}

.card-title-group {
  display: flex;
  align-items: center;
  gap: 12px;
}

.card-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  font-weight: 600;
}

.card-specs {
  display: flex;
  gap: 6px;
}

.spec-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 5px;
  font-weight: 500;
}

.spec-badge.s-badge { background: var(--sign-bg); color: var(--sign-fg); border: 1px solid rgba(108, 90, 212, 0.3); }
.spec-badge.e-badge { background: var(--exp-bg); color: var(--exp-fg); border: 1px solid rgba(60, 176, 106, 0.3); }
.spec-badge.m-badge { background: var(--frac-bg); color: var(--frac-fg); border: 1px solid rgba(192, 80, 96, 0.3); }

.card-info {
  display: flex;
  gap: 16px;
  align-items: center;
  font-size: 12px;
  color: var(--text-muted);
  font-family: 'JetBrains Mono', monospace;
}

.card-info-item {
  display: flex;
  align-items: center;
  gap: 4px;
}

.card-info-label {
  color: var(--text-muted);
}

.card-info-value {
  color: var(--text-dim);
}

.card-body {
  padding: 20px 24px;
}

/* --- Bit grid --- */
.bit-grid-wrapper {
  overflow-x: auto;
  margin: 0 -4px;
  padding: 0 4px;
}

.bit-grid {
  display: inline-flex;
  flex-direction: column;
  gap: 2px;
  min-width: fit-content;
}

.bit-indices {
  display: flex;
  gap: 2px;
}

.bit-index {
  width: 28px;
  height: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--text-muted);
  user-select: none;
}

.bit-cells {
  display: flex;
  gap: 2px;
}

.bit-cell {
  width: 28px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 600;
  border-radius: 5px;
  cursor: pointer;
  transition: all 0.1s ease;
  user-select: none;
  border: 1px solid transparent;
}

.bit-cell.sign {
  background: var(--sign-bg);
  color: var(--sign-fg);
  border-color: rgba(108, 90, 212, 0.2);
}
.bit-cell.sign:hover, .bit-cell.sign.hover {
  background: var(--sign-hover);
  border-color: var(--sign-border);
  transform: translateY(-1px);
  box-shadow: 0 3px 8px rgba(108, 90, 212, 0.25);
}

.bit-cell.exponent {
  background: var(--exp-bg);
  color: var(--exp-fg);
  border-color: rgba(60, 176, 106, 0.2);
}
.bit-cell.exponent:hover, .bit-cell.exponent.hover {
  background: var(--exp-hover);
  border-color: var(--exp-border);
  transform: translateY(-1px);
  box-shadow: 0 3px 8px rgba(60, 176, 106, 0.25);
}

.bit-cell.fraction {
  background: var(--frac-bg);
  color: var(--frac-fg);
  border-color: rgba(192, 80, 96, 0.2);
}
.bit-cell.fraction:hover, .bit-cell.fraction.hover {
  background: var(--frac-hover);
  border-color: var(--frac-border);
  transform: translateY(-1px);
  box-shadow: 0 3px 8px rgba(192, 80, 96, 0.25);
}

.bit-cell.one {
  font-weight: 700;
}

.bit-cell.zero {
  opacity: 0.6;
}

/* nibble separator */
.bit-cells .nibble-sep {
  width: 6px;
  flex-shrink: 0;
}
.bit-indices .nibble-sep {
  width: 6px;
  flex-shrink: 0;
}

/* --- Value display row --- */
.value-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 16px;
  flex-wrap: wrap;
}

.value-block {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 12px;
  transition: border-color 0.15s ease;
}

.value-block:focus-within {
  border-color: var(--accent);
}

.value-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  white-space: nowrap;
  user-select: none;
}

.value-input {
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  background: none;
  border: none;
  outline: none;
  min-width: 100px;
}

.value-input.hex-input {
  min-width: 60px;
  text-transform: uppercase;
}

.value-input::selection {
  background: rgba(108, 138, 255, 0.3);
}

.copy-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 26px;
  height: 26px;
  border-radius: 5px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s ease;
  flex-shrink: 0;
}

.copy-btn:hover {
  background: var(--border);
  color: var(--text);
}

.copy-btn.copied {
  color: var(--exp-fg);
}

.copy-btn svg {
  width: 14px;
  height: 14px;
}

.equals-sign {
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  color: var(--text-muted);
  user-select: none;
}

/* --- Formula display --- */
.formula-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  flex-wrap: wrap;
}

.formula-part {
  padding: 4px 10px;
  border-radius: 6px;
  font-weight: 500;
}

.formula-part.sign-part {
  background: var(--sign-bg);
  color: var(--sign-fg);
}

.formula-part.exp-part {
  background: var(--exp-bg);
  color: var(--exp-fg);
}

.formula-part.exp-part sup {
  font-size: 10px;
  vertical-align: super;
  line-height: 0;
}

.formula-part.frac-part {
  background: var(--frac-bg);
  color: var(--frac-fg);
}

.formula-op {
  color: var(--text-muted);
  font-size: 13px;
}

/* --- Preset buttons --- */
.preset-row {
  display: flex;
  gap: 6px;
  margin-top: 14px;
  flex-wrap: wrap;
}

.preset-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 5px;
  border: 1px solid var(--border);
  background: var(--preset-bg);
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s ease;
  user-select: none;
  white-space: nowrap;
}

.preset-btn:hover {
  background: var(--preset-hover);
  border-color: var(--border-active);
  color: var(--text);
}

.preset-btn.active {
  background: rgba(108, 138, 255, 0.12);
  border-color: var(--accent);
  color: var(--accent);
}

/* --- Scrollbar --- */
::-webkit-scrollbar {
  width: 6px;
  height: 6px;
}
::-webkit-scrollbar-track {
  background: transparent;
}
::-webkit-scrollbar-thumb {
  background: var(--scrollbar-thumb);
  border-radius: 3px;
}
::-webkit-scrollbar-thumb:hover {
  background: var(--border-active);
}

/* --- Responsive --- */
@media (max-width: 900px) {
  .sidebar {
    display: none;
  }
  .main-content {
    margin-left: 0;
    padding: 20px 16px 60px;
  }
}

/* --- Tooltip --- */
.tooltip {
  position: fixed;
  background: var(--bg-card);
  border: 1px solid var(--border-active);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 12px;
  color: var(--text);
  pointer-events: none;
  z-index: 999;
  opacity: 0;
  transition: opacity 0.15s ease;
  max-width: 220px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}

.tooltip.visible {
  opacity: 1;
}

.tooltip-label {
  font-weight: 600;
  margin-bottom: 2px;
}

.tooltip-detail {
  color: var(--text-dim);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
}

/* --- Mobile nav --- */
.mobile-nav {
  display: none;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--bg-card);
  border-top: 1px solid var(--border);
  padding: 8px;
  z-index: 100;
  overflow-x: auto;
  gap: 4px;
}

@media (max-width: 900px) {
  .mobile-nav {
    display: flex;
  }
  .main-content {
    padding-bottom: 80px;
  }
}

.mobile-nav-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  padding: 6px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--preset-bg);
  color: var(--text-dim);
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
}

.mobile-nav-btn:hover, .mobile-nav-btn.active {
  background: rgba(108, 138, 255, 0.1);
  color: var(--accent);
  border-color: var(--accent);
}
</style>
</head>

<div class="tooltip" id="tooltip">
  <div class="tooltip-label" id="tooltip-label"></div>
  <div class="tooltip-detail" id="tooltip-detail"></div>
</div>

<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>Float Toy</h1>
      <div class="subtitle">IEEE 754 Explorer</div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-legend">
      <div class="legend-title">Bit Fields</div>
      <div class="legend-item"><span class="legend-dot sign"></span> Sign (S)</div>
      <div class="legend-item"><span class="legend-dot exponent"></span> Exponent (E)</div>
      <div class="legend-item"><span class="legend-dot fraction"></span> Mantissa (M)</div>
    </div>
  </aside>

  <main class="main-content">
    <div class="main-header">
      <p>
        Click bits to toggle values, drag across bits to flip multiple, or edit hex / decimal directly.
        Quick presets load special values like
        <a href="https://en.wikipedia.org/wiki/NaN">NaN</a>,
        <a href="https://en.wikipedia.org/wiki/IEEE_754#Positive_and_negative_infinity">Inf</a>, and
        <a href="https://en.wikipedia.org/wiki/Subnormal_number">subnormals</a>.
      </p>
    </div>
    <div id="cards-container"></div>
  </main>
</div>

<script>
function float64ToBits(doubleNumber) {
  if (typeof doubleNumber !== "number")
    throw new Error("A float number is expected.");
  var buffer = new ArrayBuffer(8);
  (new Float64Array(buffer))[0] = doubleNumber;
  var uint32Array = new Uint32Array(buffer);
  let binaryString = "";
  for (let i = 1; i >= 0; --i) {
    binaryString += uint32Array[i].toString(2).padStart(32, "0");
  }
  return [binaryString.substring(0, 1), binaryString.substring(1, 12), binaryString.substring(12, 64)];
}

class FloatArray {
  constructor(init, num_sign = 1, num_e = 5, num_m = 10, custom_func = []) {
    this.num_s = num_sign;
    this.num_e = num_e;
    this.num_m = num_m;
    this.num_bits = num_sign + num_e + num_m;
    this.Bits = new Uint8Array(this.num_bits);
    this.custom_func = custom_func;
    this.fromFloat(init);
  }

  click(index) {
    this.Bits[index] ^= 1;
  }

  getE() {
    var exponent = this.isExponentAllZero() ? 1 : 0;
    for (var i = 0; i < this.num_e; i++) {
      exponent += this.Bits[1 + i] << (this.num_e - i - 1);
    }
    return exponent - ((1 << (this.num_e - 1)) - 1);
  }

  getS() {
    return this.Bits[0] ? -1 : 1;
  }

  isExponentAllZero() {
    for (var i = this.num_s; i < this.num_e + this.num_s; i++) {
      if (this.Bits[i]) return false;
    }
    return true;
  }

  isExponentAllOne() {
    for (var i = this.num_s; i < this.num_e + this.num_s; i++) {
      if (!this.Bits[i]) return false;
    }
    return true;
  }

  isMantissaAllZero() {
    for (var i = this.num_s + this.num_e; i < this.num_bits; i++) {
      if (this.Bits[i]) return false;
    }
    return true;
  }

  getF() {
    var base = this.isExponentAllZero() ? 0.0 : 1.0;
    var offset = this.num_s + this.num_e;
    for (var i = offset; i < this.num_bits; i++) {
      base += this.Bits[i] * 2 ** (offset - i - 1);
    }
    return base;
  }

  getFloat() {
    for (var i = 0; i < this.custom_func.length; i++) {
      var tmp = this.custom_func[i](this.num_s, this.num_e, this.num_m, this.Bits);
      if (tmp != null) return tmp;
    }
    var fraction = this.getF();
    var float_output = this.getS() * fraction * 2 ** this.getE();
    var fraction_base = this.isExponentAllZero() ? 0 : 1;
    return float_output.toPrecision(Math.ceil(Math.log10(2 ** this.num_m)) + fraction_base);
  }

  fromHex(hexstr) {
    for (var i = 0; i < hexstr.length; i++) {
      var binstr = parseInt(hexstr[i], 16).toString(2).padStart(4, '0');
      for (var j = 0; j < binstr.length; j++) {
        this.Bits[i * 4 + j] = parseInt(binstr[j], 2);
      }
    }
  }

  fromBits(bitsArray) {
    for (var i = 0; i < Math.min(bitsArray.length, this.num_bits); i++) {
      this.Bits[i] = bitsArray[i];
    }
  }

  fromFloat(f) {
    var out = float64ToBits(f);
    this.Bits[0] = parseInt(out[0], 2);
    for (var i = 0; i < this.num_m; i++) {
      this.Bits[this.num_s + this.num_e + i] = parseInt(out[2][i], 2);
    }
    var exponent_base = 0;
    if (this.num_bits < 64) {
      if (parseInt(out[2][this.num_m], 2) == 1) {
        exponent_base = 1;
        for (var i = 0; i < this.num_m; i++) {
          var index = this.num_s + this.num_e + this.num_m - i - 1;
          if (this.Bits[index] == 1) {
            this.Bits[index] = 0;
          } else {
            this.Bits[index] = 1;
            exponent_base = 0;
            break;
          }
        }
      }
    }
    if (out[1] == "00000000000") {
      for (var i = 0; i < this.num_e; i++) this.Bits[this.num_s + i] = 0;
      return;
    }
    var newBias = (1 << (this.num_e - 1)) - 1;
    var oldBias = (1 << 10) - 1;
    var exponent = exponent_base;
    for (var i = 0; i < out[1].length; i++) {
      exponent += parseInt(out[1][i], 2) << (11 - i - 1);
    }
    var new_e = newBias + exponent - oldBias;
    var binary = new_e.toString(2).padStart(this.num_e, '0');
    for (var i = 0; i < binary.length; i++) {
      this.Bits[this.num_s + i] = parseInt(binary[i], 2);
    }
  }

  toHex() {
    var d = '0123456789ABCDEF';
    var output = '';
    var tmp = 0;
    for (var i = 0; i < this.Bits.length; i++) {
      tmp += this.Bits[i] << (3 - (i % 4));
      if ((i + 1) % 4 == 0) {
        output += d[tmp];
        tmp = 0;
      }
    }
    return this.Bits.length % 4 == 0 ? output : output + d[tmp];
  }

  getHexLength() {
    return Math.ceil(this.Bits.length / 4);
  }
}

// --- Special value checks ---
function check_e4m3_nan(s, e, m, bits) {
  var sum = 0;
  for (var i = s; i < bits.length; i++) sum += bits[i];
  if (sum !== 7) return null;
  return (bits[0] ? "-" : "") + "NaN";
}

function check_zero(s, e, m, bits) {
  var sum = 0;
  for (var i = s; i < bits.length; i++) sum += bits[i];
  if (sum === 0) return (bits[0] ? "-" : "") + "0";
  return null;
}

function check_inf(s, e, m, bits) {
  for (var i = s + e; i < bits.length; i++) {
    if (bits[i] !== 0) return null;
  }
  for (var i = s; i < bits.length - m; i++) {
    if (bits[i] !== 1) return null;
  }
  return (bits[0] ? "-" : "") + "Inf";
}

function check_nan(s, e, m, bits) {
  for (var i = s; i < bits.length - m; i++) {
    if (bits[i] !== 1) return null;
  }
  var sum = 0;
  for (var i = s + e; i < bits.length; i++) sum += bits[i];
  if (sum === 0) return null;
  return (bits[0] ? "-" : "") + "NaN";
}

// --- Format definitions ---
const FORMATS = [
  { id: 'e4m3',  name: 'FP8 E4M3',  bits: 8,  s: 1, e: 4, m: 3,  checks: [check_e4m3_nan, check_zero], hasInf: false },
  { id: 'e5m2',  name: 'FP8 E5M2',  bits: 8,  s: 1, e: 5, m: 2,  checks: [check_nan, check_inf, check_zero], hasInf: true },
  { id: 'f16',   name: 'FP16 Half',  bits: 16, s: 1, e: 5, m: 10, checks: [check_nan, check_inf, check_zero], hasInf: true },
  { id: 'bf16',  name: 'BFloat16',   bits: 16, s: 1, e: 8, m: 7,  checks: [check_nan, check_inf, check_zero], hasInf: true },
  { id: 'tf32',  name: 'TF32',       bits: 19, s: 1, e: 8, m: 10, checks: [check_nan, check_inf, check_zero], hasInf: true },
  { id: 'fp24',  name: 'AMD FP24',   bits: 24, s: 1, e: 7, m: 16, checks: [check_nan, check_inf, check_zero], hasInf: true },
  { id: 'f32',   name: 'FP32 Float', bits: 32, s: 1, e: 8, m: 23, checks: [check_nan, check_inf, check_zero], hasInf: true },
  { id: 'f64',   name: 'FP64 Double',bits: 64, s: 1, e: 11, m: 52, checks: [check_nan, check_inf, check_zero], hasInf: true },
];

function getPresets(fmt) {
  const bias = (1 << (fmt.e - 1)) - 1;
  const presets = [
    { label: '0', desc: 'Positive zero', bits: () => new Array(fmt.bits).fill(0) },
    { label: '-0', desc: 'Negative zero', bits: () => { let b = new Array(fmt.bits).fill(0); b[0] = 1; return b; }},
    { label: '1.0', desc: 'One', bits: () => {
      let b = new Array(fmt.bits).fill(0);
      let biasStr = bias.toString(2).padStart(fmt.e, '0');
      for (let i = 0; i < fmt.e; i++) b[1 + i] = parseInt(biasStr[i]);
      return b;
    }},
    { label: '-1.0', desc: 'Negative one', bits: () => {
      let b = new Array(fmt.bits).fill(0);
      b[0] = 1;
      let biasStr = bias.toString(2).padStart(fmt.e, '0');
      for (let i = 0; i < fmt.e; i++) b[1 + i] = parseInt(biasStr[i]);
      return b;
    }},
    { label: 'Max', desc: 'Largest finite value', bits: () => {
      let b = new Array(fmt.bits).fill(1);
      b[0] = 0;
      if (fmt.hasInf) {
        b[fmt.e] = 0;
      }
      if (fmt.id === 'e4m3') {
        b[fmt.bits - 1] = 0;
      }
      return b;
    }},
    { label: 'Min Normal', desc: 'Smallest normal', bits: () => {
      let b = new Array(fmt.bits).fill(0);
      b[fmt.e] = 1;
      return b;
    }},
    { label: 'Min Subnormal', desc: 'Smallest subnormal', bits: () => {
      let b = new Array(fmt.bits).fill(0);
      b[fmt.bits - 1] = 1;
      return b;
    }},
  ];
  if (fmt.hasInf) {
    presets.push({ label: '+Inf', desc: 'Positive infinity', bits: () => {
      let b = new Array(fmt.bits).fill(0);
      for (let i = 1; i <= fmt.e; i++) b[i] = 1;
      return b;
    }});
    presets.push({ label: '-Inf', desc: 'Negative infinity', bits: () => {
      let b = new Array(fmt.bits).fill(0);
      b[0] = 1;
      for (let i = 1; i <= fmt.e; i++) b[i] = 1;
      return b;
    }});
  }
  presets.push({ label: 'NaN', desc: 'Not a Number', bits: () => {
    let b = new Array(fmt.bits).fill(0);
    for (let i = 1; i <= fmt.e; i++) b[i] = 1;
    b[fmt.s + fmt.e] = 1;
    if (fmt.id === 'e4m3') {
      for (let i = 1; i < fmt.bits; i++) b[i] = 1;
    }
    return b;
  }});
  presets.push({ label: 'π', desc: 'Pi (3.14159…)', value: Math.PI });
  presets.push({ label: 'e', desc: 'Euler\'s number', value: Math.E });
  return presets;
}

function getFormatInfo(fmt) {
  const bias = (1 << (fmt.e - 1)) - 1;
  return { bias, totalBits: fmt.bits };
}

// --- Tooltip ---
const tooltipEl = document.getElementById('tooltip');
const tooltipLabel = document.getElementById('tooltip-label');
const tooltipDetail = document.getElementById('tooltip-detail');
let tooltipTimer = null;

function showTooltip(el, label, detail) {
  clearTimeout(tooltipTimer);
  tooltipLabel.textContent = label;
  tooltipDetail.textContent = detail;
  const rect = el.getBoundingClientRect();
  tooltipEl.style.left = rect.left + rect.width / 2 + 'px';
  tooltipEl.style.top = (rect.top - 8) + 'px';
  tooltipEl.style.transform = 'translate(-50%, -100%)';
  tooltipEl.classList.add('visible');
}

function hideTooltip() {
  tooltipTimer = setTimeout(() => tooltipEl.classList.remove('visible'), 100);
}

// --- Build UI ---
const cardsContainer = document.getElementById('cards-container');
const sidebarNav = document.getElementById('sidebar-nav');
const mobileNav = document.getElementById('mobile-nav');

const copySVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
const checkSVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

function copyToClipboard(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.innerHTML = checkSVG;
    btn.classList.add('copied');
    setTimeout(() => {
      btn.innerHTML = copySVG;
      btn.classList.remove('copied');
    }, 1200);
  });
}

// Intersection observer for active nav state
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const id = entry.target.id;
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.querySelectorAll('.mobile-nav-btn').forEach(n => n.classList.remove('active'));
      const navEl = document.querySelector(`.nav-item[data-target="${id}"]`);
      const mobEl = document.querySelector(`.mobile-nav-btn[data-target="${id}"]`);
      if (navEl) navEl.classList.add('active');
      if (mobEl) mobEl.classList.add('active');
    }
  });
}, { threshold: 0.3, rootMargin: '-60px 0px -50% 0px' });

FORMATS.forEach(fmt => {
  const info = getFormatInfo(fmt);
  const array = new FloatArray(Math.PI, fmt.s, fmt.e, fmt.m, fmt.checks);

  // Sidebar nav
  const navItem = document.createElement('a');
  navItem.className = 'nav-item';
  navItem.dataset.target = 'card-' + fmt.id;
  navItem.href = '#card-' + fmt.id;
  navItem.innerHTML = `${fmt.name}<span class="nav-badge">${fmt.bits}b</span>`;
  navItem.onclick = (e) => {
    e.preventDefault();
    document.getElementById('card-' + fmt.id).scrollIntoView({ behavior: 'smooth' });
  };
  sidebarNav.appendChild(navItem);

  // Mobile nav
  const mobBtn = document.createElement('button');
  mobBtn.className = 'mobile-nav-btn';
  mobBtn.dataset.target = 'card-' + fmt.id;
  mobBtn.textContent = fmt.name;
  mobBtn.onclick = () => document.getElementById('card-' + fmt.id).scrollIntoView({ behavior: 'smooth' });
  mobileNav.appendChild(mobBtn);

  // Card
  const card = document.createElement('div');
  card.className = 'format-card';
  card.id = 'card-' + fmt.id;

  card.innerHTML = `
    <div class="card-header">
      <div class="card-title-group">
        <span class="card-title">${fmt.name}</span>
        <div class="card-specs">
          <span class="spec-badge s-badge">S:${fmt.s}</span>
          <span class="spec-badge e-badge">E:${fmt.e}</span>
          <span class="spec-badge m-badge">M:${fmt.m}</span>
        </div>
      </div>
      <div class="card-info">
        <div class="card-info-item">
          <span class="card-info-label">Bias</span>
          <span class="card-info-value">${info.bias}</span>
        </div>
      </div>
    </div>
    <div class="card-body">
      <div class="bit-grid-wrapper">
        <div class="bit-grid">
          <div class="bit-indices" id="indices-${fmt.id}"></div>
          <div class="bit-cells" id="cells-${fmt.id}"></div>
        </div>
      </div>
      <div class="value-row">
        <div class="value-block">
          <span class="value-label">Hex</span>
          <span class="value-label" style="color: var(--text-muted)">0x</span>
          <input class="value-input hex-input" id="hex-${fmt.id}" spellcheck="false" autocomplete="off">
          <button class="copy-btn" id="copy-hex-${fmt.id}" title="Copy hex">${copySVG}</button>
        </div>
        <span class="equals-sign">=</span>
        <div class="value-block" style="flex:1; min-width: 160px;">
          <span class="value-label">Dec</span>
          <input class="value-input" id="dec-${fmt.id}" spellcheck="false" autocomplete="off" style="flex:1">
          <button class="copy-btn" id="copy-dec-${fmt.id}" title="Copy decimal">${copySVG}</button>
        </div>
      </div>
      <div class="formula-row" id="formula-${fmt.id}"></div>
      <div class="preset-row" id="presets-${fmt.id}"></div>
    </div>
  `;

  cardsContainer.appendChild(card);
  observer.observe(card);

  // Build bit cells
  const indicesEl = document.getElementById('indices-' + fmt.id);
  const cellsEl = document.getElementById('cells-' + fmt.id);
  const elements = [];

  for (let i = 0; i < array.num_bits; i++) {
    if (i > 0 && i % 4 === 0) {
      const sepI = document.createElement('div');
      sepI.className = 'nibble-sep';
      indicesEl.appendChild(sepI);
      const sepC = document.createElement('div');
      sepC.className = 'nibble-sep';
      cellsEl.appendChild(sepC);
    }

    const idx = document.createElement('div');
    idx.className = 'bit-index';
    idx.textContent = array.num_bits - i - 1;
    indicesEl.appendChild(idx);

    const cell = document.createElement('div');
    const cls = i === 0 ? 'sign' : i < 1 + fmt.e ? 'exponent' : 'fraction';
    cell.className = 'bit-cell ' + cls;
    cell.dataset.index = i;
    cell.textContent = '0';

    const fieldName = i === 0 ? 'Sign' : i < 1 + fmt.e ? 'Exponent' : 'Mantissa';
    const bitPos = array.num_bits - i - 1;

    cell.onmouseenter = function(ev) {
      this.classList.add('hover');
      showTooltip(this, `Bit ${bitPos} — ${fieldName}`, `Click to toggle`);
    };
    cell.onmouseleave = function() {
      this.classList.remove('hover');
      hideTooltip();
    };

    elements.push(cell);
    cellsEl.appendChild(cell);
  }

  // Inputs
  const hexInput = document.getElementById('hex-' + fmt.id);
  const decInput = document.getElementById('dec-' + fmt.id);
  const formulaEl = document.getElementById('formula-' + fmt.id);
  const copyHexBtn = document.getElementById('copy-hex-' + fmt.id);
  const copyDecBtn = document.getElementById('copy-dec-' + fmt.id);

  copyHexBtn.onclick = () => copyToClipboard('0x' + array.toHex(), copyHexBtn);
  copyDecBtn.onclick = () => copyToClipboard(array.getFloat().toString(), copyDecBtn);

  function render() {
    for (let i = 0; i < array.num_bits; i++) {
      elements[i].textContent = array.Bits[i];
      elements[i].classList.toggle('one', array.Bits[i] === 1);
      elements[i].classList.toggle('zero', array.Bits[i] === 0);
    }

    const floatVal = array.getFloat();
    const hexVal = array.toHex();

    if (document.activeElement !== hexInput) hexInput.value = hexVal;
    if (document.activeElement !== decInput) decInput.value = floatVal;

    const fraction_base = array.isExponentAllZero() ? 0 : 1;
    const fracPrecision = Math.ceil(Math.log10(2 ** array.num_m) + fraction_base);

    formulaEl.innerHTML =
      `<span class="formula-part sign-part">${array.getS()}</span>` +
      `<span class="formula-op">&times;</span>` +
      `<span class="formula-part exp-part">2<sup>${array.getE()}</sup></span>` +
      `<span class="formula-op">&times;</span>` +
      `<span class="formula-part frac-part">${array.getF().toPrecision(fracPrecision)}</span>` +
      `<span class="formula-op">=</span>` +
      `<span style="font-weight:600; color: var(--text)">${floatVal}</span>`;

    highlightActivePreset();
  }

  // Decimal input
  decInput.onkeydown = function(e) {
    if (e.key === 'Enter') { e.preventDefault(); this.blur(); }
  };
  decInput.oninput = function() {
    const val = +(this.value.replace(/\b(?:infinity|inf)\b/gi, 'Infinity'));
    if (!isNaN(val) || this.value.match(/^-?nan$/i)) {
      array.fromFloat(val);
      render();
    }
  };
  decInput.onblur = render;

  // Hex input
  hexInput.onkeydown = function(e) {
    if (e.key === 'Enter') { e.preventDefault(); this.blur(); }
  };
  hexInput.onfocus = function() { this.select(); };
  hexInput.oninput = function() {
    const valid = /^[0-9a-fA-F]*$/.test(this.value);
    if (!valid || this.value.length > array.getHexLength()) {
      this.value = this.value.slice(0, -1);
    }
    array.fromHex(this.value);
    render();
  };
  hexInput.onblur = render;

  // Bit click and drag
  let isDragging = false;
  let dragValue = null;

  cellsEl.onmousedown = function(e) {
    if (e.target.dataset.index !== undefined) {
      e.preventDefault();
      const index = parseInt(e.target.dataset.index);
      array.click(index);
      dragValue = array.Bits[index];
      isDragging = true;
      render();
    }
  };

  cellsEl.onmouseover = function(e) {
    if (isDragging && e.target.dataset.index !== undefined) {
      const index = parseInt(e.target.dataset.index);
      if (array.Bits[index] !== dragValue) {
        array.Bits[index] = dragValue;
        render();
      }
    }
  };

  document.addEventListener('mouseup', () => {
    isDragging = false;
    dragValue = null;
  });

  // Presets
  const presetsEl = document.getElementById('presets-' + fmt.id);
  const presets = getPresets(fmt);
  const presetBtns = [];

  presets.forEach(preset => {
    const btn = document.createElement('button');
    btn.className = 'preset-btn';
    btn.textContent = preset.label;
    btn.title = preset.desc;
    btn.onclick = () => {
      if (preset.bits) {
        array.fromBits(preset.bits());
      } else if (preset.value !== undefined) {
        array.fromFloat(preset.value);
      }
      render();
    };
    presetsEl.appendChild(btn);
    presetBtns.push({ btn, preset });
  });

  function highlightActivePreset() {
    const currentHex = array.toHex();
    presetBtns.forEach(({ btn, preset }) => {
      if (preset.bits) {
        const testArr = new FloatArray(0, fmt.s, fmt.e, fmt.m, fmt.checks);
        testArr.fromBits(preset.bits());
        btn.classList.toggle('active', testArr.toHex() === currentHex);
      } else {
        btn.classList.remove('active');
      }
    });
  }

  render();
});
</script>
</body>
</html>
