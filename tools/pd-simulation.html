<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PD Disaggregation Simulator</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#e6edf3;font-family:system-ui,-apple-system,sans-serif;font-size:13px;overflow-x:hidden}
.container{max-width:1600px;margin:0 auto;padding:10px}
h1{font-size:18px;color:#58a6ff;padding:8px 0;text-align:center;border-bottom:1px solid #21262d;margin-bottom:10px}
.controls{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.ctrl-group{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:8px 12px;flex:1;min-width:200px}
.ctrl-title{font-size:11px;color:#8b949e;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-weight:600}
.ctrl-group label{display:inline-flex;align-items:center;gap:4px;margin:2px 6px 2px 0;font-size:12px;color:#c9d1d9}
.ctrl-group input[type="number"]{width:60px;background:#0d1117;border:1px solid #30363d;color:#e6edf3;border-radius:4px;padding:2px 4px;font-size:12px;text-align:right}
.ctrl-group input[type="range"]{width:100px;accent-color:#58a6ff}
.ctrl-group input[type="checkbox"]{accent-color:#58a6ff}
.ctrl-group select{background:#0d1117;border:1px solid #30363d;color:#e6edf3;border-radius:4px;padding:2px 4px;font-size:12px}
.ctrl-group button{background:#21262d;border:1px solid #30363d;color:#e6edf3;border-radius:4px;padding:4px 10px;cursor:pointer;font-size:12px;margin:2px 4px}
.ctrl-group button:hover{background:#30363d}
.ctrl-group .unit{color:#8b949e;font-size:11px}
.viz-wrap{background:#0d1117;border:1px solid #21262d;border-radius:8px;overflow:hidden;margin-bottom:10px}
.viz-wrap canvas{display:block;width:100%}
.bottom{display:flex;gap:10px}
.chart-wrap{flex:3;background:#161b22;border:1px solid #30363d;border-radius:8px;padding:10px;min-height:260px}
.chart-wrap canvas{width:100%!important;height:240px!important}
.stats-panel{flex:1.2;background:#161b22;border:1px solid #30363d;border-radius:8px;padding:10px;min-width:220px}
.stats-panel h3{font-size:11px;color:#8b949e;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.stat-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #21262d}
.stat-label{color:#8b949e;font-size:12px}
.stat-value{color:#e6edf3;font-size:12px;font-weight:600;font-variant-numeric:tabular-nums}
.stat-value.blue{color:#58a6ff}
.stat-value.green{color:#3fb950}
.stat-value.orange{color:#d29922}
.stat-value.red{color:#f85149}
.sim-time{text-align:center;font-size:11px;color:#8b949e;padding:4px}
</style>
</head>
<body>
<div class="container">
  <h1>PD Disaggregation Simulator</h1>
  <div class="controls">
    <div class="ctrl-group">
      <div class="ctrl-title">Request Generator</div>
      <label>ISL <input type="number" id="c_isl" value="8192" step="1024" min="128"></label>
      <label>OSL <input type="number" id="c_osl" value="1024" step="128" min="1"></label>
      <label>Range <input type="number" id="c_range" value="0.8" step="0.05" min="0.1" max="1"></label>
      <label>Rate <input type="number" id="c_rate" value="1" step="0.1" min="0"> <span class="unit">req/s</span></label>
      <label><input type="checkbox" id="c_inf"> Infinite</label>
    </div>
    <div class="ctrl-group">
      <div class="ctrl-title">Prefill (DEP)</div>
      <label>Nodes <input type="number" id="c_pfN" value="1" min="1" max="20"></label>
      <label>DEP <input type="number" id="c_pfD" value="4" min="1" max="16"></label>
      <label>Latency <input type="number" id="c_pfL" value="600" step="50" min="10"> <span class="unit">ms@ISL</span></label>
    </div>
    <div class="ctrl-group">
      <div class="ctrl-title">Decode (DEP)</div>
      <label>Nodes <input type="number" id="c_dcN" value="8" min="1" max="200"></label>
      <label>DEP <input type="number" id="c_dcD" value="8" min="1" max="16"></label>
      <label>TPOT <input type="number" id="c_tpot" value="66" step="1" min="1"> <span class="unit">ms</span></label>
      <label>MinTPOT <input type="number" id="c_mtpot" value="20" step="1" min="1"> <span class="unit">ms</span></label>
    </div>
    <div class="ctrl-group">
      <div class="ctrl-title">Simulation</div>
      <label>Speed <input type="range" id="c_speed" min="1" max="500" value="50"> <span id="speedLbl">50x</span></label>
      <button id="btnPause">Pause</button>
      <button id="btnReset">Reset</button>
    </div>
  </div>
  <div class="viz-wrap">
    <canvas id="vizCanvas"></canvas>
  </div>
  <div class="bottom">
    <div class="chart-wrap">
      <canvas id="chartCanvas"></canvas>
    </div>
    <div class="stats-panel">
      <h3>Statistics</h3>
      <div class="stat-row"><span class="stat-label">Sim Time</span><span class="stat-value" id="s_time">0:00</span></div>
      <div class="stat-row"><span class="stat-label">Generated</span><span class="stat-value" id="s_gen">0</span></div>
      <div class="stat-row"><span class="stat-label">Completed</span><span class="stat-value green" id="s_comp">0</span></div>
      <div class="stat-row"><span class="stat-label">Throughput</span><span class="stat-value green" id="s_tput">0</span></div>
      <hr style="border-color:#21262d;margin:4px 0">
      <div class="stat-row"><span class="stat-label">PF Queue</span><span class="stat-value blue" id="s_pfq">0</span></div>
      <div class="stat-row"><span class="stat-label">Transfer Queue</span><span class="stat-value orange" id="s_tfq">0</span></div>
      <div class="stat-row"><span class="stat-label">DC Running</span><span class="stat-value green" id="s_dcr">0</span></div>
      <hr style="border-color:#21262d;margin:4px 0">
      <div class="stat-row"><span class="stat-label">PF Utilization</span><span class="stat-value blue" id="s_pfutil">0%</span></div>
      <div class="stat-row"><span class="stat-label">PF Bubble</span><span class="stat-value red" id="s_pfbub">0%</span></div>
      <div class="stat-row"><span class="stat-label">DC Utilization</span><span class="stat-value green" id="s_dcutil">0%</span></div>
      <hr style="border-color:#21262d;margin:4px 0">
      <div class="stat-row"><span class="stat-label">Avg Latency</span><span class="stat-value" id="s_lat">-</span></div>
      <div class="stat-row"><span class="stat-label">Avg TTFT</span><span class="stat-value" id="s_ttft">-</span></div>
      <div class="stat-row"><span class="stat-label">DC Max Capacity</span><span class="stat-value" id="s_cap">-</span></div>
    </div>
  </div>
</div>

<script>
// ===================== CONFIG =====================
const $ = id => document.getElementById(id);

function readConfig() {
  return {
    isl:       +$('c_isl').value,
    osl:       +$('c_osl').value,
    range:     +$('c_range').value,
    rate:      +$('c_rate').value,
    infinite:  $('c_inf').checked,
    pfNodes:   +$('c_pfN').value,
    pfDEP:     +$('c_pfD').value,
    pfLatency: +$('c_pfL').value,
    dcNodes:   +$('c_dcN').value,
    dcDEP:     +$('c_dcD').value,
    tpot:      +$('c_tpot').value,
    minTpot:   +$('c_mtpot').value,
    speed:     +$('c_speed').value,
  };
}

// ===================== STATE =====================
let cfg, sim, stats, chartState;
let reqIdCounter = 0;

function createRequest() {
  const minISL = Math.round(cfg.isl * cfg.range);
  const minOSL = Math.round(cfg.osl * cfg.range);
  return {
    id: reqIdCounter++,
    isl: Math.round(minISL + Math.random() * (cfg.isl - minISL)),
    osl: Math.round(minOSL + Math.random() * (cfg.osl - minOSL)),
    createdAt: sim.time,
    pfStart: 0, pfEnd: 0,
    dcStart: 0, dcEnd: 0,
    outputTokens: 0,
  };
}

function resetSim() {
  cfg = readConfig();
  reqIdCounter = 0;
  sim = {
    time: 0, paused: false,
    pfQueue: [], tfQueue: [], completed: [],
    pfGroups: [], dcGroups: [],
    reqAccum: 0, totalGen: 0,
  };
  for (let i = 0; i < cfg.pfNodes; i++) {
    sim.pfGroups.push({ id: i, active: false, batch: [], startT: 0, endT: 0, dur: 0 });
  }
  for (let i = 0; i < cfg.dcNodes; i++) {
    sim.dcGroups.push({ id: i, slots: new Array(cfg.dcDEP).fill(null), lastStep: 0, wasIdle: true });
  }
  stats = {
    pfBusyMs: 0, pfTotalMs: 0,
    pfUseful: 0, pfTotal: 0,
    dcActivMs: 0, dcTotalMs: 0,
    compCount: 0, latSum: 0, ttftSum: 0,
  };
  chartState = { times: [], pfQ: [], tfQ: [], dcR: [], lastRec: 0 };
  if (chart) {
    chart.data.labels = [];
    chart.data.datasets.forEach(ds => ds.data = []);
    chart.update('none');
  }
}

// ===================== SIMULATION =====================
function tick(dt) {
  sim.time += dt;

  // 1. Generate requests
  if (cfg.infinite) {
    while (sim.pfQueue.length < 200) {
      sim.pfQueue.push(createRequest());
      sim.totalGen++;
    }
  } else if (cfg.rate > 0) {
    sim.reqAccum += cfg.rate * dt / 1000;
    while (sim.reqAccum >= 1) {
      sim.pfQueue.push(createRequest());
      sim.reqAccum--;
      sim.totalGen++;
    }
  }

  // 2. Prefill groups
  for (const g of sim.pfGroups) {
    if (g.active && sim.time >= g.endT) {
      for (const r of g.batch) {
        r.pfEnd = g.endT;
        sim.tfQueue.push(r);
      }
      const lens = g.batch.map(r => r.isl);
      const maxL = Math.max(...lens);
      const sumL = lens.reduce((a, b) => a + b, 0);
      stats.pfUseful += sumL;
      stats.pfTotal += maxL * cfg.pfDEP;
      g.active = false;
      g.batch = [];
    }
    if (!g.active && sim.pfQueue.length > 0) {
      const batch = [];
      for (let i = 0; i < cfg.pfDEP && sim.pfQueue.length > 0; i++) {
        batch.push(sim.pfQueue.shift());
      }
      const maxL = Math.max(...batch.map(r => r.isl));
      const dur = maxL / cfg.isl * cfg.pfLatency;
      g.batch = batch;
      g.startT = sim.time;
      g.endT = sim.time + dur;
      g.dur = dur;
      g.active = true;
      for (const r of batch) r.pfStart = sim.time;
    }
  }

  // 3. Decode groups
  for (const g of sim.dcGroups) {
    for (let i = 0; i < g.slots.length; i++) {
      if (g.slots[i] === null && sim.tfQueue.length > 0) {
        const r = sim.tfQueue.shift();
        r.dcStart = sim.time;
        r.outputTokens = 0;
        g.slots[i] = r;
      }
    }
    let active = 0;
    for (const s of g.slots) if (s) active++;
    if (active === 0) { g.wasIdle = true; g.lastStep = sim.time; continue; }
    if (g.wasIdle) { g.lastStep = sim.time; g.wasIdle = false; }

    let tpot = Math.max(cfg.minTpot, cfg.tpot * active / cfg.dcDEP);
    let safety = 0;
    while (sim.time - g.lastStep >= tpot && safety < 200) {
      safety++;
      g.lastStep += tpot;
      for (let i = 0; i < g.slots.length; i++) {
        if (g.slots[i]) {
          g.slots[i].outputTokens++;
          if (g.slots[i].outputTokens >= g.slots[i].osl) {
            g.slots[i].dcEnd = g.lastStep;
            stats.compCount++;
            stats.latSum += g.slots[i].dcEnd - g.slots[i].createdAt;
            stats.ttftSum += g.slots[i].dcStart - g.slots[i].createdAt;
            sim.completed.push(g.slots[i]);
            g.slots[i] = null;
          }
        }
      }
      for (let i = 0; i < g.slots.length; i++) {
        if (g.slots[i] === null && sim.tfQueue.length > 0) {
          const r = sim.tfQueue.shift();
          r.dcStart = sim.time;
          r.outputTokens = 0;
          g.slots[i] = r;
        }
      }
      active = 0;
      for (const s of g.slots) if (s) active++;
      if (active === 0) { g.wasIdle = true; break; }
      tpot = Math.max(cfg.minTpot, cfg.tpot * active / cfg.dcDEP);
    }
  }

  // 4. Stats accumulators
  for (const g of sim.pfGroups) {
    stats.pfTotalMs += dt;
    if (g.active) stats.pfBusyMs += dt;
  }
  for (const g of sim.dcGroups) {
    for (const s of g.slots) {
      stats.dcTotalMs += dt;
      if (s !== null) stats.dcActivMs += dt;
    }
  }

  // 5. Chart recording
  if (sim.time - chartState.lastRec >= 500) {
    chartState.lastRec = sim.time;
    let dcR = 0;
    for (const g of sim.dcGroups) for (const s of g.slots) if (s) dcR++;
    chartState.times.push(sim.time / 1000);
    chartState.pfQ.push(sim.pfQueue.length);
    chartState.tfQ.push(sim.tfQueue.length);
    chartState.dcR.push(dcR);
    const maxPts = 300;
    while (chartState.times.length > maxPts) {
      chartState.times.shift(); chartState.pfQ.shift();
      chartState.tfQ.shift(); chartState.dcR.shift();
    }
  }
}

function simulate(realDt) {
  if (sim.paused) return;
  cfg.speed = +$('c_speed').value;
  const simDt = realDt * cfg.speed;
  const steps = Math.min(Math.ceil(simDt), 8000);
  const step = simDt / steps;
  for (let i = 0; i < steps; i++) tick(step);
}

// ===================== VISUALIZATION =====================
const vizCanvas = $('vizCanvas');
const vizCtx = vizCanvas.getContext('2d');
let dpr = window.devicePixelRatio || 1;

function resizeViz() {
  const rect = vizCanvas.parentElement.getBoundingClientRect();
  const maxRows = Math.max(sim.pfGroups.length, Math.ceil(sim.dcGroups.length / (sim.dcGroups.length > 8 ? 3 : sim.dcGroups.length > 4 ? 2 : 1)));
  const h = Math.max(280, 60 + maxRows * 55);
  vizCanvas.style.height = h + 'px';
  vizCanvas.width = rect.width * dpr;
  vizCanvas.height = h * dpr;
  vizCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawArrow(ctx, x1, y1, x2, y2, hasFlow) {
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  if (hasFlow) {
    ctx.strokeStyle = '#58a6ff55';
    ctx.lineWidth = 2;
    ctx.setLineDash([7, 5]);
    ctx.lineDashOffset = -(sim.time * 0.03) % 12;
  } else {
    ctx.strokeStyle = '#ffffff15';
    ctx.lineWidth = 1;
    ctx.setLineDash([]);
  }
  ctx.stroke();
  const ang = Math.atan2(y2 - y1, x2 - x1);
  const aLen = 6;
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - aLen * Math.cos(ang - 0.4), y2 - aLen * Math.sin(ang - 0.4));
  ctx.lineTo(x2 - aLen * Math.cos(ang + 0.4), y2 - aLen * Math.sin(ang + 0.4));
  ctx.closePath();
  ctx.fillStyle = hasFlow ? '#58a6ff88' : '#ffffff33';
  ctx.fill();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawQueue(ctx, count, x, y, w, h, color, label) {
  roundRect(ctx, x, y, w, h, 6);
  ctx.fillStyle = '#161b22';
  ctx.fill();
  ctx.strokeStyle = '#30363d';
  ctx.lineWidth = 1;
  ctx.stroke();
  const maxVis = 100;
  const fill = Math.min(1, count / maxVis);
  if (fill > 0) {
    const fh = (h - 4) * fill;
    roundRect(ctx, x + 2, y + h - fh - 2, w - 4, fh, 4);
    ctx.fillStyle = color + '33';
    ctx.fill();
  }
  ctx.fillStyle = '#e6edf3';
  ctx.font = 'bold 14px system-ui';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(count, x + w / 2, y + h / 2);
  ctx.font = '9px system-ui';
  ctx.fillStyle = '#8b949e';
  ctx.fillText(label, x + w / 2, y - 6);
}

function drawPfGroups(ctx, x, y, w, h) {
  const groups = sim.pfGroups;
  const gH = Math.min(48, (h - 5) / Math.max(1, groups.length) - 4);
  ctx.font = '9px system-ui';
  ctx.fillStyle = '#8b949e';
  ctx.textAlign = 'center';
  ctx.fillText('Prefill (DEP' + cfg.pfDEP + ')', x + w / 2, y - 6);

  for (let gi = 0; gi < groups.length; gi++) {
    const g = groups[gi];
    const gy = y + gi * (gH + 4);
    roundRect(ctx, x, gy, w, gH, 5);
    ctx.fillStyle = g.active ? '#0d1926' : '#0d1117';
    ctx.fill();
    ctx.strokeStyle = g.active ? '#58a6ff44' : '#30363d';
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.fillStyle = '#8b949e';
    ctx.font = '9px system-ui';
    ctx.textAlign = 'left';
    ctx.fillText('P' + (gi + 1), x + 4, gy + 12);

    const cellPad = 24;
    const gap = 2;
    const cellW = Math.max(12, (w - cellPad - gap * (cfg.pfDEP - 1)) / cfg.pfDEP);
    const cellH = gH - 18;
    const cellY = gy + 14;

    for (let j = 0; j < cfg.pfDEP; j++) {
      const cx = x + cellPad + j * (cellW + gap);
      ctx.fillStyle = '#1c2333';
      ctx.fillRect(cx, cellY, cellW, cellH);
      const req = g.batch[j];
      if (req && g.active) {
        const prog = Math.min(1, (sim.time - g.startT) / g.dur);
        ctx.fillStyle = '#58a6ff';
        ctx.fillRect(cx, cellY, cellW * prog, cellH);
      }
      ctx.strokeStyle = '#30363d';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(cx, cellY, cellW, cellH);
    }

    if (g.active) {
      const prog = Math.min(1, (sim.time - g.startT) / g.dur);
      ctx.fillStyle = '#58a6ff';
      ctx.font = '9px system-ui';
      ctx.textAlign = 'right';
      ctx.fillText(Math.round(prog * 100) + '%', x + w - 4, gy + 12);
    }
  }
}

function drawDcGroups(ctx, x, y, w, h) {
  const groups = sim.dcGroups;
  const cols = groups.length > 8 ? 3 : groups.length > 4 ? 2 : 1;
  const rows = Math.ceil(groups.length / cols);
  const colW = (w - (cols - 1) * 6) / cols;
  const gH = Math.min(48, (h - 5) / rows - 4);

  ctx.font = '9px system-ui';
  ctx.fillStyle = '#8b949e';
  ctx.textAlign = 'center';
  ctx.fillText('Decode (DEP' + cfg.dcDEP + ')', x + w / 2, y - 6);

  for (let gi = 0; gi < groups.length; gi++) {
    const g = groups[gi];
    const col = gi % cols;
    const row = Math.floor(gi / cols);
    const gx = x + col * (colW + 6);
    const gy = y + row * (gH + 4);

    let active = 0;
    for (const s of g.slots) if (s) active++;

    roundRect(ctx, gx, gy, colW, gH, 5);
    ctx.fillStyle = active > 0 ? '#0b1a0b' : '#0d1117';
    ctx.fill();
    ctx.strokeStyle = active > 0 ? '#3fb95044' : '#30363d';
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.fillStyle = '#8b949e';
    ctx.font = '9px system-ui';
    ctx.textAlign = 'left';
    ctx.fillText('D' + (gi + 1), gx + 3, gy + 10);

    ctx.textAlign = 'right';
    ctx.fillStyle = active > 0 ? '#3fb950' : '#484f58';
    ctx.fillText(active + '/' + cfg.dcDEP, gx + colW - 3, gy + 10);

    const cellPad = 4;
    const cellRows = cfg.dcDEP > 4 ? 2 : 1;
    const cellsPerRow = Math.ceil(cfg.dcDEP / cellRows);
    const gap = 1;
    const cellW = Math.max(8, (colW - 2 * cellPad - gap * (cellsPerRow - 1)) / cellsPerRow);
    const cellH = (gH - 14 - (cellRows - 1) * gap) / cellRows;
    const cellStartY = gy + 12;

    for (let j = 0; j < cfg.dcDEP; j++) {
      const cr = Math.floor(j / cellsPerRow);
      const cc = j % cellsPerRow;
      const cx = gx + cellPad + cc * (cellW + gap);
      const cy = cellStartY + cr * (cellH + gap);
      const req = g.slots[j];

      ctx.fillStyle = '#1c2333';
      ctx.fillRect(cx, cy, cellW, cellH);

      if (req) {
        const prog = req.outputTokens / req.osl;
        const hue = 130;
        const light = 22 + prog * 30;
        ctx.fillStyle = `hsl(${hue},55%,${light}%)`;
        ctx.fillRect(cx, cy, cellW * Math.min(1, prog), cellH);
      }
      ctx.strokeStyle = '#30363d';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(cx, cy, cellW, cellH);
    }
  }
}

function drawGenerator(ctx, x, y, w, h) {
  ctx.font = '9px system-ui';
  ctx.fillStyle = '#8b949e';
  ctx.textAlign = 'center';
  ctx.fillText('Generator', x + w / 2, y - 6);
  roundRect(ctx, x, y, w, h, 6);
  ctx.fillStyle = '#161b22';
  ctx.fill();
  ctx.strokeStyle = '#30363d';
  ctx.lineWidth = 1;
  ctx.stroke();

  const pulse = 0.5 + 0.5 * Math.sin(sim.time * 0.005);
  const cx = x + w / 2, cy = y + h * 0.35;
  ctx.beginPath();
  ctx.arc(cx, cy, 10 + pulse * 4, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(88,166,255,${0.15 + pulse * 0.15})`;
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx, cy, 6, 0, Math.PI * 2);
  ctx.fillStyle = '#58a6ff';
  ctx.fill();

  ctx.fillStyle = '#e6edf3';
  ctx.font = '11px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText(cfg.infinite ? '∞' : cfg.rate + '/s', cx, y + h * 0.65);
  ctx.font = '9px system-ui';
  ctx.fillStyle = '#8b949e';
  ctx.fillText('gen: ' + sim.totalGen, cx, y + h * 0.82);
}

function drawOutput(ctx, x, y, w, h) {
  ctx.font = '9px system-ui';
  ctx.fillStyle = '#8b949e';
  ctx.textAlign = 'center';
  ctx.fillText('Output', x + w / 2, y - 6);
  roundRect(ctx, x, y, w, h, 6);
  ctx.fillStyle = '#161b22';
  ctx.fill();
  ctx.strokeStyle = '#30363d';
  ctx.lineWidth = 1;
  ctx.stroke();

  ctx.fillStyle = '#3fb950';
  ctx.font = 'bold 18px system-ui';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(stats.compCount, x + w / 2, y + h * 0.4);
  ctx.font = '9px system-ui';
  ctx.fillStyle = '#8b949e';
  ctx.fillText('completed', x + w / 2, y + h * 0.6);

  if (stats.compCount > 0 && sim.time > 0) {
    const tput = (stats.compCount / (sim.time / 1000)).toFixed(2);
    ctx.fillText(tput + ' req/s', x + w / 2, y + h * 0.78);
  }
  ctx.textBaseline = 'alphabetic';
}

function drawViz() {
  resizeViz();
  const w = vizCanvas.width / dpr;
  const h = vizCanvas.height / dpr;
  const ctx = vizCtx;

  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, w, h);

  const pad = 12;
  const topY = 22;
  const contentH = h - topY - pad;
  const gapX = 12;

  const genW = 60;
  const qW = 55;
  const outW = 65;
  const fixedW = genW + qW * 2 + outW + gapX * 5;
  const flexW = w - 2 * pad - fixedW;
  const pfGW = flexW * 0.35;
  const dcGW = flexW * 0.65;

  let cx = pad;
  const genX = cx; cx += genW + gapX;
  const pfQX = cx; cx += qW + gapX;
  const pfGX = cx; cx += pfGW + gapX;
  const tfQX = cx; cx += qW + gapX;
  const dcGX = cx; cx += dcGW + gapX;
  const outX = cx;

  drawGenerator(ctx, genX, topY, genW, contentH);
  drawQueue(ctx, sim.pfQueue.length, pfQX, topY, qW, contentH, '#58a6ff', 'PF Queue');
  drawPfGroups(ctx, pfGX, topY, pfGW, contentH);
  drawQueue(ctx, sim.tfQueue.length, tfQX, topY, qW, contentH, '#d29922', 'Transfer Q');
  drawDcGroups(ctx, dcGX, topY, dcGW, contentH);
  drawOutput(ctx, outX, topY, outW, contentH);

  const midY = topY + contentH / 2;
  const hasGenFlow = sim.pfQueue.length > 0 || (cfg.rate > 0 || cfg.infinite);
  drawArrow(ctx, genX + genW, midY, pfQX, midY, hasGenFlow);
  const hasPfFlow = sim.pfGroups.some(g => g.active);
  drawArrow(ctx, pfQX + qW, midY, pfGX, midY, hasPfFlow || sim.pfQueue.length > 0);
  drawArrow(ctx, pfGX + pfGW, midY, tfQX, midY, sim.tfQueue.length > 0 || hasPfFlow);
  const hasDcFlow = sim.dcGroups.some(g => g.slots.some(s => s !== null));
  drawArrow(ctx, tfQX + qW, midY, dcGX, midY, hasDcFlow || sim.tfQueue.length > 0);
  drawArrow(ctx, dcGX + dcGW, midY, outX, midY, stats.compCount > 0);

  ctx.fillStyle = '#484f58';
  ctx.font = '10px system-ui';
  ctx.textAlign = 'center';
  const t = sim.time / 1000;
  const mm = Math.floor(t / 60);
  const ss = (t % 60).toFixed(1);
  ctx.fillText('Sim: ' + mm + ':' + ss.padStart(4, '0') + '  |  Speed: ' + cfg.speed + 'x', w / 2, h - 3);
}

// ===================== CHART =====================
let chart;
Chart.defaults.color = '#8b949e';
Chart.defaults.borderColor = '#21262d';

function initChart() {
  const ctx = $('chartCanvas').getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: [],
      datasets: [
        { label: 'Prefill Queue', data: [], borderColor: '#58a6ff', backgroundColor: '#58a6ff22', borderWidth: 1.5, pointRadius: 0, tension: 0.3, yAxisID: 'y' },
        { label: 'Transfer Queue', data: [], borderColor: '#d29922', backgroundColor: '#d2992222', borderWidth: 1.5, pointRadius: 0, tension: 0.3, borderDash: [4, 3], yAxisID: 'y' },
        { label: 'Decode Running', data: [], borderColor: '#3fb950', backgroundColor: '#3fb95022', borderWidth: 2, pointRadius: 0, tension: 0.3, yAxisID: 'y1' },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { labels: { font: { size: 11 }, boxWidth: 14 } } },
      scales: {
        x: { title: { display: true, text: 'Simulation Time (s)', font: { size: 10 } }, ticks: { font: { size: 9 }, maxTicksLimit: 15 } },
        y: { position: 'left', title: { display: true, text: 'Queue Depth', font: { size: 10 } }, min: 0, ticks: { font: { size: 9 } }, grid: { color: '#21262d' } },
        y1: { position: 'right', title: { display: true, text: 'Decode Running', font: { size: 10 } }, min: 0, ticks: { font: { size: 9 } }, grid: { drawOnChartArea: false } },
      },
    },
  });
}

let lastChartUpdate = 0;
function updateChart(now) {
  if (now - lastChartUpdate < 250) return;
  lastChartUpdate = now;
  chart.data.labels = chartState.times.map(t => t.toFixed(1));
  chart.data.datasets[0].data = [...chartState.pfQ];
  chart.data.datasets[1].data = [...chartState.tfQ];
  chart.data.datasets[2].data = [...chartState.dcR];
  chart.update('none');
}

// ===================== STATS DISPLAY =====================
function updateStatsDisplay() {
  const t = sim.time / 1000;
  const mm = Math.floor(t / 60);
  const ss = Math.floor(t % 60);
  $('s_time').textContent = mm + ':' + String(ss).padStart(2, '0');
  $('s_gen').textContent = sim.totalGen;
  $('s_comp').textContent = stats.compCount;

  const tput = sim.time > 0 ? (stats.compCount / (sim.time / 1000)) : 0;
  $('s_tput').textContent = tput.toFixed(2) + ' req/s';

  $('s_pfq').textContent = sim.pfQueue.length;
  $('s_tfq').textContent = sim.tfQueue.length;

  let dcR = 0;
  for (const g of sim.dcGroups) for (const s of g.slots) if (s) dcR++;
  $('s_dcr').textContent = dcR + ' / ' + (cfg.dcNodes * cfg.dcDEP);

  const pfUtil = stats.pfTotalMs > 0 ? (stats.pfBusyMs / stats.pfTotalMs * 100) : 0;
  $('s_pfutil').textContent = pfUtil.toFixed(1) + '%';

  const pfBub = stats.pfTotal > 0 ? ((1 - stats.pfUseful / stats.pfTotal) * 100) : 0;
  $('s_pfbub').textContent = pfBub.toFixed(1) + '%';

  const dcUtil = stats.dcTotalMs > 0 ? (stats.dcActivMs / stats.dcTotalMs * 100) : 0;
  $('s_dcutil').textContent = dcUtil.toFixed(1) + '%';

  if (stats.compCount > 0) {
    $('s_lat').textContent = (stats.latSum / stats.compCount / 1000).toFixed(2) + 's';
    $('s_ttft').textContent = (stats.ttftSum / stats.compCount).toFixed(0) + 'ms';
  } else {
    $('s_lat').textContent = '-';
    $('s_ttft').textContent = '-';
  }

  const maxCap = cfg.dcNodes * cfg.dcDEP / (cfg.osl * cfg.tpot / 1000);
  $('s_cap').textContent = maxCap.toFixed(2) + ' req/s';
}

// ===================== UI EVENTS =====================
$('c_speed').addEventListener('input', () => {
  $('speedLbl').textContent = $('c_speed').value + 'x';
});

$('btnPause').addEventListener('click', () => {
  sim.paused = !sim.paused;
  $('btnPause').textContent = sim.paused ? 'Resume' : 'Pause';
});

$('btnReset').addEventListener('click', () => {
  resetSim();
  $('btnPause').textContent = 'Pause';
});

// ===================== MAIN LOOP =====================
let lastFrameTime = 0;

function loop(ts) {
  if (lastFrameTime === 0) lastFrameTime = ts;
  const realDt = Math.min(ts - lastFrameTime, 100);
  lastFrameTime = ts;

  simulate(realDt);
  drawViz();
  updateChart(ts);
  updateStatsDisplay();

  requestAnimationFrame(loop);
}

// ===================== INIT =====================
resetSim();
initChart();
requestAnimationFrame(loop);
</script>
</body>
