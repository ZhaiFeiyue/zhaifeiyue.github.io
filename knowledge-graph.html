<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Knowledge Graph · Feiyue Zhai</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root {
  --bg: #fbfbfd;
  --fg: #111827;
  --muted: #6b7280;
  --bd: #e5e7eb;
  --accent: #2563eb;
  --nav: #1b2a4a;
  --panel: #ffffff;
  --shadow: 0 4px 14px rgba(0,0,0,0.06);
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
  background: var(--bg); color: var(--fg); height: 100vh; overflow: hidden;
  display: flex; flex-direction: column;
}
nav {
  background: var(--nav); color: #fff; padding: 0 24px;
  display: flex; align-items: center; gap: 22px;
  height: 48px; flex-shrink: 0;
}
nav .logo { font-weight: 700; font-size: 1.05rem; }
nav a { color: #cbd5e1; font-size: 0.88rem; font-weight: 500; text-decoration: none; }
nav a:hover { color: #fff; }
main {
  flex: 1; display: grid;
  grid-template-columns: 280px 1fr 320px;
  gap: 0; min-height: 0;
}
aside.left, aside.right {
  background: var(--panel); padding: 16px; overflow-y: auto;
  border-right: 1px solid var(--bd);
}
aside.right { border-right: none; border-left: 1px solid var(--bd); }
aside h2 {
  font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--muted); margin: 0 0 10px; font-weight: 600;
}
aside h3 { font-size: 0.95rem; margin: 18px 0 8px; }
.legend-row {
  display: flex; align-items: center; gap: 8px; padding: 4px 6px;
  border-radius: 4px; cursor: pointer; user-select: none;
  font-size: 0.85rem;
}
.legend-row:hover { background: #f3f4f6; }
.legend-row.off { opacity: 0.35; }
.legend-row .dot {
  width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
}
.legend-row .count { margin-left: auto; color: var(--muted); font-size: 0.78rem; }
.search-box {
  width: 100%; padding: 7px 10px; border: 1px solid var(--bd);
  border-radius: 6px; font-size: 0.88rem; margin-bottom: 12px;
}
.toggle-row {
  display: flex; align-items: center; gap: 8px; padding: 6px 0;
  font-size: 0.85rem; cursor: pointer;
}
.toggle-row input { cursor: pointer; }
.stats-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
  font-size: 0.82rem;
}
.stat-card {
  background: #f9fafb; border-radius: 6px; padding: 8px;
}
.stat-card .v { font-size: 1.2rem; font-weight: 700; color: var(--accent); }
.stat-card .l { color: var(--muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.04em; }
.top-list { font-size: 0.82rem; }
.top-list a {
  display: flex; justify-content: space-between; padding: 3px 6px;
  text-decoration: none; color: var(--fg); border-radius: 4px;
}
.top-list a:hover { background: #f3f4f6; }
.top-list .cnt { color: var(--muted); }

#viz { width: 100%; height: 100%; cursor: grab; background: #fbfbfd; }
#viz:active { cursor: grabbing; }
.node circle {
  stroke: #fff; stroke-width: 1.5px;
  cursor: pointer;
  transition: stroke-width 0.15s, stroke 0.15s;
}
.node.new circle {
  stroke: #f59e0b; stroke-width: 2.5px;
}
.node.dim circle, .link.dim {
  opacity: 0.08;
}
.node.hl circle {
  stroke: #111827; stroke-width: 3px;
}
.link {
  stroke: #cbd5e1; stroke-opacity: 0.55; stroke-width: 1px;
  transition: stroke 0.15s, stroke-opacity 0.15s, stroke-width 0.15s;
}
.link.hl {
  stroke: #1f2937; stroke-opacity: 0.85; stroke-width: 2px;
}
.node text {
  font-size: 9px; fill: #374151; pointer-events: none;
  text-anchor: middle; dy: 0.35em;
}
.detail-panel {
  font-size: 0.85rem; line-height: 1.5;
}
.detail-panel .empty { color: var(--muted); font-style: italic; }
.detail-panel .pid {
  font-family: ui-monospace, "SF Mono", monospace; font-size: 0.78rem;
  color: var(--muted);
}
.detail-panel .cat-pill {
  display: inline-block; padding: 2px 8px; border-radius: 10px;
  color: #fff; font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.04em;
}
.detail-panel h3 { margin: 8px 0 4px; font-size: 1rem; line-height: 1.3; }
.detail-panel .core { color: #374151; margin: 8px 0; }
.detail-panel .tags { margin: 8px 0; }
.detail-panel .tag {
  display: inline-block; padding: 1px 7px; margin: 2px 3px 2px 0;
  background: #f3f4f6; border-radius: 10px; font-size: 0.72rem;
  color: #4b5563;
}
.detail-panel .related { margin-top: 10px; }
.detail-panel .related a {
  display: block; padding: 3px 6px; font-size: 0.8rem;
  color: var(--fg); text-decoration: none; border-radius: 4px;
}
.detail-panel .related a:hover { background: #f3f4f6; }
.detail-panel .open-btn {
  display: inline-block; margin-top: 12px; padding: 6px 14px;
  background: var(--accent); color: #fff; border-radius: 6px;
  text-decoration: none; font-size: 0.85rem; font-weight: 500;
}
.detail-panel .open-btn:hover { background: #1d4ed8; }
.subtle {
  color: var(--muted); font-size: 0.78rem; margin-top: 4px;
}

@media (max-width: 1100px) {
  main { grid-template-columns: 1fr; grid-template-rows: auto 1fr auto; }
  aside.left, aside.right {
    max-height: 200px; border-left: none; border-right: none;
    border-bottom: 1px solid var(--bd);
  }
  aside.right { border-bottom: none; border-top: 1px solid var(--bd); }
}
</style>
</head>

<nav>
  <a class="logo" href="/">Feiyue Zhai</a>

<main>
  <aside class="left">
    <h2>Filters</h2>
    <input type="text" class="search-box" id="search" placeholder="Search title / id / tag…">
    <h3>Category</h3>
    <div id="legend"></div>
    <h3>Highlight</h3>
    <label class="toggle-row">
      <input type="checkbox" id="highlight-new" checked>
      <span>Recent reads (last 30 days)</span>
    </label>
    <label class="toggle-row">
      <input type="checkbox" id="hide-isolated">
      <span>Hide isolated nodes</span>
    </label>
    <label class="toggle-row">
      <input type="checkbox" id="show-labels">
      <span>Show node labels</span>
    </label>

    <h3>Stats</h3>
    <div class="stats-grid" id="stats"></div>

    <h3>Top Connectors</h3>
    <div class="top-list" id="top-list"></div>
  </aside>

  <div style="position: relative; min-width: 0; min-height: 0;">
    <svg id="viz"></svg>
    <div style="position: absolute; bottom: 8px; left: 12px; font-size: 0.75rem; color: var(--muted);" id="generated"></div>
  </div>

  <aside class="right">
    <h2>Detail</h2>
    <div class="detail-panel" id="detail">
      <p class="empty">Hover or click a node to see details.</p>
      <p class="subtle">
        Drag nodes · scroll to zoom · click background to reset.<br>
        Orange ring = read in the last 30 days.
      </p>
    </div>
  </aside>
</main>

<script>
const DATA = {"nodes": [{"id": "2312.11819", "title": "An Adaptive Placement and Parallelism Framework for Accelerating RLHF Training", "category": "framework", "tags": ["RLHF", "placement", "parallelism", "distributed-training", "scheduling"], "date": "2023-12", "date_read": "2026-04-16", "url": "papers/2312.11819.html", "core": "Adaptive placement and parallelism framework that co-optimizes model placement and parallelism strategy for RLHF training, reducing training time through workload-aware scheduling across heterogeneous GPU resources."}, {"id": "2409.19256", "title": "HybridFlow: A Flexible and Efficient RLHF Framework", "category": "framework", "tags": ["RLHF", "training-system", "scheduling", "distributed-training", "hybrid-programming"], "date": "2024-09", "date_read": "2026-04-16", "url": "papers/2409.19256.html", "core": "HybridFlow combines single-controller flexibility with multi-controller efficiency for RLHF training, using a 3D-HybridEngine that unifies training and generation in a single runtime."}, {"id": "2412.14335", "title": "Optimizing ML Concurrent Computation and Communication with GPU DMA Engines", "category": "kernel", "tags": ["GPU-DMA", "compute-communication-overlap", "CUDA", "copy-engine", "kernel-optimization"], "date": "2024-12", "date_read": "2026-04-16", "url": "papers/2412.14335.html", "core": "Systematic characterization and optimization of GPU DMA copy engines for overlapping computation with communication in distributed ML, achieving up to 15% end-to-end training speedup."}, {"id": "2412.19437", "title": "DeepSeek-V3 Technical Report", "category": "framework", "tags": ["algorithm", "kernel", "llm", "MoE", "pipeline-parallelism", "FP8-training"], "date": "2024-12", "date_read": "2026-04-16", "url": "papers/2412.19437.html", "core": "DualPipe — a bidirectional pipeline parallelism algorithm achieving full computation-communication overlap for cross-node MoE training, enabling 671B parameter model training at only $5.576M cost."}, {"id": "2510.27656", "title": "fabric-lib: RDMA Point-to-Point Communication for LLM Systems", "category": "cluster", "tags": ["RDMA", "communication", "point-to-point", "LLM-systems", "networking", "disaggregated-inference"], "date": "2025-10", "date_read": "2026-04-16", "url": "papers/2510.27656.html", "core": "A user-space RDMA library optimized for LLM inference workloads, providing zero-copy point-to-point transfers that outperform NCCL by up to 3.6x for KV-cache and tensor transfers in disaggregated serving."}, {"id": "2511.02168", "title": "Eliminating Multi-GPU Performance Taxes: A Systems Approach to Efficient Distributed LLMs", "category": "cluster", "tags": ["multi-GPU", "performance-overhead", "distributed-systems", "communication", "synchronization"], "date": "2025-11", "date_read": "2026-04-16", "url": "papers/2511.02168.html", "core": "Identifies and quantifies 'performance taxes' in multi-GPU LLM systems (synchronization, serialization, memory management overhead), proposing systems-level solutions to eliminate them."}, {"id": "2601.06288", "title": "AIConfigurator: Lightning-Fast Configuration Optimization for Multi-Framework LLM Serving", "category": "framework", "tags": ["serving", "configuration-optimization", "LLM-serving", "auto-tuning", "multi-framework"], "date": "2026-01", "date_read": "2026-04-16", "url": "papers/2601.06288.html", "core": "A fast configuration optimizer for LLM serving that uses analytical modeling + Bayesian optimization to find near-optimal parallelism, batching, and framework configs in minutes instead of hours."}, {"id": "2602.21548", "title": "DualPath: Breaking the Storage Bandwidth Bottleneck in Agentic LLM Inference", "category": "framework", "tags": ["serving", "KV-cache", "disaggregated-inference", "agentic-workloads", "RDMA", "scheduling"], "date": "2026-02", "date_read": "2026-04-16", "url": "papers/2602.21548.html", "core": "DualPath introduces dual-path KV-Cache loading in PD-disaggregated inference, leveraging idle decode-engine storage NICs to break prefill-side I/O bottleneck, achieving up to 1.87x offline and 1.96x online throughput improvement."}, {"id": "2511.08083", "title": "HipKittens: Fast and Furious AMD Kernels", "category": "kernel", "tags": ["AMD GPU", "tile-based DSL", "CDNA4", "GEMM", "attention kernel"], "date": "2025-11", "date_read": "2026-04-16", "url": "papers/2511.08083.html", "core": "First systematic C++ embedded tile-based programming framework for AMD GPUs, introducing 8-wave ping-pong scheduling, explicit register pinning, and chiplet-aware cache optimization that match or outperform hand-optimized assembly kernels."}, {"id": "2509.24006", "title": "SLA: Beyond Sparsity in Diffusion Transformers via Fine-Tunable Sparse-Linear Attention", "category": "kernel", "tags": ["sparse-attention", "linear-attention", "diffusion-transformer", "video-generation"], "date": "2025-09", "date_read": "2026-04-16", "url": "papers/2509.24006.html", "core": "SLA fuses sparse and linear attention into a single GPU kernel by exploiting the natural decomposition of attention weights into high-rank sparse and low-rank dense components, achieving 95% attention sparsity and 13.7x kernel speedup witho"}, {"id": "2502.01563", "title": "Massive Values in Self-Attention Modules are the Key to Contextual Knowledge Understanding", "category": "llm", "tags": ["quantization", "attention-mechanism", "RoPE", "interpretability", "contextual-knowledge"], "date": "2025-02", "date_read": "2026-04-16", "url": "papers/2502.01563.html", "core": "首次系统性揭示 LLM 中 Q/K 矩阵的 concentrated massive values 由 RoPE 低频维度引起，且这些大值是上下文知识理解（而非参数知识检索）的关键功能性信号，直接指导量化策略选择。"}, {"id": "2510.22200", "title": "LongCat-Video Technical Report", "category": "llm", "tags": ["video-generation", "diffusion-transformer", "GRPO", "sparse-attention", "RLHF"], "date": "2025-10", "date_read": "2026-04-16", "url": "papers/2510.22200.html", "core": "A unified 13.6B video generation model that natively supports long video generation through video-continuation pretraining, with multi-reward GRPO post-training for flow matching and efficient coarse-to-fine inference with 3D block sparse a"}, {"id": "2510.08377", "title": "UniVideo: Unified Understanding, Generation, and Editing for Videos", "category": "algorithm", "tags": ["video-generation", "multimodal", "unified-model", "diffusion-transformer", "in-context-learning"], "date": "2025-10", "date_read": "2026-04-16", "url": "papers/2510.08377.html", "core": "UniVideo proposes a dual-stream architecture (frozen MLLM + MMDiT) that unifies video understanding, generation, and editing under a single multimodal instruction paradigm, using a 3-stage training strategy and demonstrating zero-shot gener"}, {"id": "2504.09285", "title": "DynaServe: Unified and Elastic Execution for Dynamic Disaggregated LLM Serving", "category": "framework", "tags": ["serving", "scheduling", "disaggregation", "SLO-aware", "KV-cache"], "date": "2025-04", "date_read": "2026-04-16", "url": "papers/2504.09285.html", "core": "A micro-request abstraction that splits LLM requests at arbitrary token boundaries with a two-level scheduling framework, unifying colocation and disaggregation paradigms for maximizing goodput under strict SLO constraints."}, {"id": "moe-lb-interai25", "title": "Latency-Optimal Load Balancing For Distributed MoE Inference", "category": "framework", "tags": ["moe", "inference", "load-balancing", "expert-parallelism", "optimization"], "date": "2025-12", "date_read": "2026-04-16", "url": "papers/moe-lb-interai25.html", "core": "Proposes a latency-optimal algorithm for expert replication and reallocation during distributed MoE inference that jointly minimizes load imbalance and data movement overhead via ILP formulation with a polynomial-time heuristic solver."}, {"id": "2410.02367", "title": "SageAttention: Accurate 8-Bit Attention for Plug-and-play Inference Acceleration", "category": "kernel", "tags": ["attention", "quantization", "int8", "triton", "inference-acceleration"], "date": "2024-10", "date_read": "2026-04-16", "url": "papers/2410.02367.html", "core": "SageAttention proposes a plug-and-play INT8 quantization method for attention that achieves 2.1x speedup over FlashAttention2 with negligible accuracy loss, by combining K-smoothing, mixed INT8/FP16 precision, and adaptive per-layer kernel "}, {"id": "2411.10958", "title": "SageAttention2: Efficient Attention with Thorough Outlier Smoothing and Per-thread INT4 Quantization", "category": "kernel", "tags": ["attention", "quantization", "INT4", "FP8", "tensor-core"], "date": "2024-11", "date_read": "2026-04-16", "url": "papers/2411.10958.html", "core": "Quantizes Q,K to INT4 with per-thread granularity aligned to MMA instruction layout and P,V to FP8 with two-level accumulation, achieving 3x speedup over FlashAttention2 with negligible accuracy loss."}, {"id": "2505.21136", "title": "SageAttention2++: A More Efficient Implementation of SageAttention2", "category": "kernel", "tags": ["attention", "FP8", "quantization", "tensor-core", "inference-acceleration"], "date": "2025-05", "date_read": "2026-04-16", "url": "papers/2505.21136.html", "core": "Uses FP16-accumulated FP8 MMA instructions with narrowed quantization ranges to achieve 3.9x speedup over FlashAttention2 with no accuracy loss."}, {"id": "2505.11594", "title": "SageAttention3: Microscaling FP4 Attention for Inference and An Exploration of 8-Bit Training", "category": "kernel", "tags": ["attention", "FP4", "quantization", "blackwell", "training"], "date": "2025-05", "date_read": "2026-04-16", "url": "papers/2505.11594.html", "core": "First FP4 microscaling attention kernel achieving 1038 TOPS on RTX5090 (5x FlashAttention) via two-level quantization, plus the first trainable 8-bit attention (SageBwd) enabling lossless fine-tuning."}, {"id": "2603.03251", "title": "Speculative Speculative Decoding", "category": "framework", "tags": ["speculative-decoding", "inference-optimization", "latency", "parallel-decoding", "asynchronous-execution"], "date": "2026-03", "date_read": "2026-04-16", "url": "papers/2603.03251.html", "core": "提出 Speculative Speculative Decoding (SSD) 框架，通过在 verification 进行时预测 outcome 并预计算 speculation (speculation cache)，将 drafting 与 verification 完全并行化。优化算法 Saguaro 平均比最优 SD baseline 快 30%。"}, {"id": "2503.20215", "title": "Qwen2.5-Omni Technical Report", "category": "llm", "tags": ["multimodal", "omni-model", "speech-generation", "thinker-talker", "streaming"], "date": "2025-03", "date_read": "2026-04-18", "url": "papers/2503.20215.html", "core": "首个开源的 omni-modal 端到端模型 (text+image+audio+video → text+speech)。Thinker-Talker 架构: Thinker (dense 7B-class, 28L × 3584, GQA 28/4, FFN 18944) 处理理解, Talker (dense 24L × 896, dual-track AR, vocab 8448) 直接消费 Thinker hidden + token embed 驱动 codec;"}, {"id": "2509.17765", "title": "Qwen3-Omni Technical Report", "category": "llm", "tags": ["multimodal", "omni-model", "MoE", "speech-generation", "thinker-talker", "streaming"], "date": "2025-09", "date_read": "2026-04-18", "url": "papers/2509.17765.html", "core": "将 omni 推理拆为六段专门化流水线 (AuT → ViT → Thinker MoE → Talker MoE+Shared → Code Predictor → Code2Wav)，每段架构 (layers/d_model/heads/kv_heads/experts) 独立定制，总预算 30B-A3B 下做到 RTF<1、首包 234ms，并首次证明全模态无退化。"}, {"id": "amd-cdna1-whitepaper", "title": "AMD CDNA Architecture White Paper", "category": "hardware", "tags": ["gpu-architecture", "matrix-core", "hpc", "mi100", "cdna"], "date": "2020-11", "date_read": "2026-04-16", "url": "papers/amd-cdna1-whitepaper.html", "core": "AMD首个专用计算GPU架构CDNA，引入Matrix Core Engine和MFMA指令族，将GPU从图形通用架构分化为计算专用架构"}, {"id": "amd-cdna2-whitepaper", "title": "AMD CDNA 2 Architecture White Paper", "category": "hardware", "tags": ["gpu-architecture", "matrix-core", "hpc", "mi250x", "cdna2", "mcm"], "date": "2021-11", "date_read": "2026-04-16", "url": "papers/amd-cdna2-whitepaper.html", "core": "AMD CDNA 2采用MCM多芯片模块封装双GCD，引入CPU-GPU缓存一致性，FP64性能达47.9 TFLOPS驱动全球首台Exascale超算Frontier"}, {"id": "amd-cdna3-whitepaper", "title": "AMD CDNA 3 Architecture White Paper", "category": "hardware", "tags": ["gpu-architecture", "chiplet", "mi300x", "mi325x", "cdna3", "hbm3"], "date": "2023-12", "date_read": "2026-04-16", "url": "papers/amd-cdna3-whitepaper.html", "core": "革命性chiplet架构：8个5nm XCD + 4个6nm IOD 3D堆叠，引入256MB Infinity Cache、FP8支持和2:4稀疏，192-256GB HBM3/3E成为LLM推理有力竞争者"}, {"id": "amd-cdna4-whitepaper", "title": "AMD CDNA 4 Architecture White Paper", "category": "hardware", "tags": ["gpu-architecture", "chiplet", "mi355x", "cdna4", "mxfp", "fp4"], "date": "2025-03", "date_read": "2026-04-16", "url": "papers/amd-cdna4-whitepaper.html", "core": "引入OCP MX微缩放格式(MXFP8/6/4)硬件支持，Matrix Core翻倍16-bit以下吞吐，LDS扩容至160KB，FP8达5 PFLOPS，MXFP4达10 PFLOPS"}, {"id": "nv-ampere-a100-whitepaper", "title": "NVIDIA A100 Tensor Core GPU Architecture White Paper", "category": "hardware", "tags": ["gpu-architecture", "tensor-core", "a100", "ampere", "mig", "sparsity"], "date": "2020-05", "date_read": "2026-04-16", "url": "papers/nv-ampere-a100-whitepaper.html", "core": "第三代Tensor Core支持全数据类型(含FP64 TC和TF32)，引入MIG多实例GPU和2:4结构化稀疏，奠定数据中心GPU标准"}, {"id": "nv-hopper-h100-whitepaper", "title": "NVIDIA H100 Tensor Core GPU Architecture White Paper", "category": "hardware", "tags": ["gpu-architecture", "tensor-core", "h100", "hopper", "fp8", "transformer-engine"], "date": "2022-03", "date_read": "2026-04-16", "url": "papers/nv-hopper-h100-whitepaper.html", "core": "FP8 Tensor Core + Transformer Engine自动精度管理 + TMA硬件数据搬运加速 + Thread Block Clusters编程模型扩展，LLM训练最高30x加速"}, {"id": "nv-blackwell-whitepaper", "title": "NVIDIA Blackwell Architecture Technical Brief", "category": "hardware", "tags": ["gpu-architecture", "tensor-core", "b200", "gb200", "blackwell", "fp4"], "date": "2024-03", "date_read": "2026-04-16", "url": "papers/nv-blackwell-whitepaper.html", "core": "双Die统一GPU突破光刻极限(NV-HBI 10TB/s)，FP4 Tensor Core + 第二代Transformer Engine，NVLink5(1.8TB/s) + NVL72机架级GPU域"}, {"id": "gpu-arch-comparison-2025", "title": "AMD vs NVIDIA 数据中心GPU架构全面对比 (2020-2025)", "category": "hardware", "tags": ["gpu-architecture", "cdna", "ampere", "hopper", "blackwell", "comparison"], "date": "2025-04", "date_read": "2026-04-16", "url": "papers/gpu-arch-comparison-2025.html", "core": "基于7份官方白皮书的深度对比：AMD CDNA 1/2/3/4 vs NVIDIA Ampere/Hopper/Blackwell四代数据中心GPU架构"}, {"id": "2511.02132", "title": "Optimizing Attention on GPUs by Exploiting GPU Architectural NUMA Effects", "category": "kernel", "tags": ["attention", "NUMA", "MI300X", "chiplet", "L2-cache", "swizzling"], "date": "2025-11", "date_read": "2026-04-16", "url": "papers/2511.02132.html", "core": "在 AMD MI300X 多 chiplet 架构上提出 Swizzled Head-first Mapping，将同一 attention head 的 workgroups 映射到同一 XCD 以最大化 L2 cache 复用，实现 FA2 最高 50% 性能提升和 80-97% L2 cache hit rate。"}, {"id": "2510.26692", "title": "Kimi Linear: An Expressive, Efficient Attention Architecture", "category": "llm", "tags": ["kernel", "algorithm", "framework"], "date": "2025-10", "date_read": "2026-04-18", "url": "papers/2510.26692.html", "core": "首个在公平对比下全面超越 Full Attention 的混合线性注意力架构。核心 KDA (Kimi Delta Attention) 把 Gated DeltaNet 的 scalar gate 替换为 per-channel diagonal gate Diag(α_t)；通过 DPLR 约束 (a=b=k) 让 chunkwise kernel 比通用 DPLR 快 ~2x；层级混合 3 KDA + 1 MLA (NoPE), 实测 3:1 最优。"}, {"id": "2603.15031", "title": "Attention Residuals", "category": "llm", "tags": ["algorithm"], "date": "2026-03", "date_read": "2026-04-18", "url": "papers/2603.15031.html", "core": "把 PreNorm 的恒定权重残差累加替换为'softmax-attention 沿深度加权求和'：每层学一个伪 query w_ℓ 对所有先前层输出 v_i 做 softmax 选择性聚合 h_ℓ = Σ α_{i→ℓ} v_i。Block-AttnRes 训练 overhead < 4%, 已用于 Kimi Linear 48B-A3B (GPQA +7.5)。"}, {"id": "2507.20534", "title": "Kimi K2: Open Agentic Intelligence", "category": "llm", "tags": ["algorithm", "agent", "framework"], "date": "2025-07", "date_read": "2026-04-16", "url": "papers/2507.20534.html", "core": "开源1T参数MoE模型Kimi K2，提出MuonClip优化器(Muon+QK-clip)解决训练不稳定性，配合大规模agentic数据合成pipeline和joint RL，在non-thinking设定下达到开源SOTA"}, {"id": "2602.02276", "title": "Kimi K2.5: Visual Agentic Intelligence", "category": "llm", "tags": ["agent", "algorithm"], "date": "2026-02", "date_read": "2026-04-18", "url": "papers/2602.02276.html", "core": "把 K2 的 1.04T MoE LLM (61L · d=7168 · MLA · 384E top-8 + 1 shared) 复用为多模态主干，前接 27L MoonViT-3D 视觉塔；通过早期融合 10:90 vision:text + zero-vision SFT + PARL Agent Swarm + DEP infra (90% text-only throughput) 实现高效多模态训练。"}, {"id": "2512.02189", "title": "Microbenchmarking NVIDIA's Blackwell Architecture: An in-depth Architectural Analysis", "category": "hardware", "tags": ["kernel", "framework"], "date": "2025-12", "date_read": "2026-04-16", "url": "papers/2512.02189.html", "core": "首篇对 NVIDIA Blackwell B200 GPU 的系统性 PTX 微基准测试分析，量化了 TMEM(-58%延迟)、tcgen05(2.9-11.6x低延迟)、硬件解压引擎(462 GB/s)和 FP4/FP6 新精度的微架构性能特征"}, {"id": "NousResearch-hermes-agent", "title": "Hermes Agent: Self-Improving AI Agent with Closed Learning Loop", "category": "code", "tags": ["agent", "self-improving", "skills", "memory", "multi-platform", "MCP"], "date": "2026-04", "date_read": "2026-04-16", "url": "papers/NousResearch-hermes-agent.html", "core": "开源的自我进化 AI Agent 框架，具备闭环学习能力（技能自动创建与改进、持久记忆、用户建模），支持 20+ 平台网关和 6 种终端后端，从 $5 VPS 到 GPU 集群均可运行。"}, {"id": "openai-openai-agents-python", "title": "OpenAI Agents SDK: Lightweight Multi-Agent Workflow Framework", "category": "code", "tags": ["agent", "multi-agent", "tool-calling", "MCP", "handoffs", "guardrails"], "date": "2026-04", "date_read": "2026-04-16", "url": "papers/openai-openai-agents-python.html", "core": "轻量但功能强大的多Agent工作流编排框架，声明式定义Agent的指令/工具/护栏/协作关系，支持中断恢复、沙箱执行和实时语音"}, {"id": "2510.27583", "title": "AMD MI300X GPU Performance Analysis", "category": "hardware", "tags": ["GPU-benchmarking", "AMD-MI300X", "LLM-inference", "HBM-memory", "interconnect-topology"], "date": "2025-10", "date_read": "2026-04-17", "url": "papers/2510.27583.html", "core": "首个系统性、多维度的 AMD MI300X vs NVIDIA GPU 性能基准测试，通过频率-效率分离实验精确量化了软件栈效率（80-85%）和频率降低（~42%）各自对性能差距的贡献。"}, {"id": "2601.12967", "title": "Sutradhara: An Intelligent Orchestrator-Engine Co-design for Tool-based Agentic Inference", "category": "framework", "tags": ["agent", "kv-cache", "scheduling", "serving", "latency-optimization"], "date": "2026-01", "date_read": "2026-04-17", "url": "papers/2601.12967.html", "core": "提出 orchestrator-engine co-design 架构 Sutradhara，通过 5 个 thin API 实现 prompt splitting（prefill-tool overlap）、streaming tool dispatch（decode-tool overlap）和 workload-aware KV cache management，在不修改模型架构的前提下将 agentic 推理的 FTR 延迟降低 15%。"}, {"id": "2504.20068", "title": "JITServe: SLO-aware LLM Serving with Imprecise Request Information", "category": "framework", "tags": ["slo-aware", "llm-serving", "scheduling", "goodput", "agent-serving", "length-prediction"], "date": "2025-04", "date_read": "2026-04-18", "url": "papers/2504.20068.html", "core": "First SLO-aware LLM serving system that maximizes service goodput across latency/deadline/compound workloads by using conservative quantile upper-bound length predictions (QRF) plus pattern-graph dependency matching, scheduled by a Grouped "}, {"id": "2505.05286", "title": "HEXGEN-FLOW: Optimizing LLM Inference Request Scheduling for Agentic Text-to-SQL", "category": "framework", "tags": ["agentic-serving", "SLO-aware-scheduling", "heterogeneous-GPU", "text-to-sql", "two-level-scheduler", "priority-queue"], "date": "2025-05", "date_read": "2026-04-18", "url": "papers/2505.05286.html", "core": "Two-level scheduler (global workload-balanced dispatch + local urgency-based priority queue with propagating SLO budgets) that upgrades LLM serving scheduling from per-request to per-workflow granularity for agentic multi-stage workloads on"}, {"id": "2507.07400", "title": "KVFlow: Efficient Prefix Caching for Accelerating LLM-Based Multi-Agent Workflows", "category": "framework", "tags": ["prefix-caching", "kv-cache-management", "multi-agent-serving", "sglang-extension", "scheduling"], "date": "2025-07", "date_read": "2026-04-18", "url": "papers/2507.07400.html", "core": "Workflow-aware KV cache management for multi-agent LLM serving: replaces LRU with steps-to-execution priorities over the radix tree (min aggregation on shared prefixes), adds proactive CPU-GPU prefetching and 4-state status-aware scheduling"}, {"id": "2509.02121", "title": "Batch Query Processing and Optimization for Agentic Workflows", "category": "framework", "tags": ["agent", "batch-serving", "query-optimization", "dag-scheduling", "kv-cache-sharing", "cpu-gpu-pipelining"], "date": "2025-09", "date_read": "2026-04-18", "url": "papers/2509.02121.html", "core": "Halo is the first system to bring database-style batch query optimization into agentic LLM workflows: it compiles N workflow DAGs into a consolidated graph and uses an epoch-based DP solver (with topological frontier pruning) over a state-a"}, {"id": "2510.17015", "title": "Justitia: Fair and Efficient Scheduling of Task-parallel LLM Agents with Selective Pampering", "category": "framework", "tags": ["agent-scheduling", "fair-queuing", "kv-cache", "vllm", "application-level-scheduling", "virtual-time-wfq"], "date": "2025-10", "date_read": "2026-04-18", "url": "papers/2510.17015.html", "core": "Ports 1990s network WFQ (virtual-time fair queuing over GPS) to LLM application-level scheduling, using a memory-centric KV token-time cost (c = pd + d^2/2) and per-app TF-IDF+MLP demand prediction, achieving 57.5% average JCT reduction vs "}, {"id": "2511.01633", "title": "Scaling Graph Chain-of-Thought Reasoning: A Multi-Agent Framework with Efficient LLM Serving", "category": "framework", "tags": ["agent", "graph-cot", "kv-cache", "multi-agent", "serving", "prefix-caching"], "date": "2025-11", "date_read": "2026-04-18", "url": "papers/2511.01633.html", "core": "GLM is the first multi-agent Graph-CoT system co-designed with a Graph-CoT-aware LLM serving stack (vertex-centric KV reuse + four-tier priority eviction + RetrieveNode/decode pipeline), reducing token cost by 95.7%, latency by 90.3%, and b"}, {"id": "2601.22705", "title": "Concur: Proactive Agent-Level Admission Control for Efficient Agentic Batch Inference", "category": "framework", "tags": ["kv-cache", "admission-control", "agentic-inference", "congestion-control", "aimd", "scheduling"], "date": "2026-01", "date_read": "2026-04-18", "url": "papers/2601.22705.html", "core": "Concur reframes GPU KV-cache as a shared finite resource and ports TCP AIMD congestion control to agent-level admission, using KV usage + hit-rate dual-signal feedback to eliminate middle-phase thrashing in agentic batch inference—deliverin"}, {"id": "2602.13692", "title": "ThunderAgent: A Simple, Fast and Program-Aware Agentic Inference System", "category": "framework", "tags": ["agentic-inference", "kv-cache-scheduling", "program-abstraction", "rl-rollout", "tool-orchestration", "agent-serving"], "date": "2026-02", "date_read": "2026-04-18", "url": "papers/2602.13692.html", "core": "Introduces the Agentic Program as a first-class scheduling unit persisting across LLM calls and tool executions, plus a program-aware scheduler (global waiting queue, state-aware pause/restore, provably optimal exponential time-decay cachin"}, {"id": "2602.21477", "title": "Pancake: Hierarchical Memory System for Multi-Agent LLM Serving", "category": "framework", "tags": ["agent-memory", "multi-agent", "vector-db", "ANN", "GPU-CPU-coordination", "hybrid-graph"], "date": "2026-02", "date_read": "2026-04-18", "url": "papers/2602.21477.html", "core": "First multi-tier ANN memory system for multi-agent LLM serving, combining FSM-driven three-level index cache, cross-agent hybrid graph, and CPU-staged GPU-accelerated dynamic clustering to cut memory-op time from >82% to 3.2% with 4.29× ave"}, {"id": "2603.16104", "title": "Efficient LLM Serving for Agentic Workflows: A Data Systems Perspective", "category": "framework", "tags": ["agent-serving", "prefix-caching", "query-optimization", "scheduling", "batch-agentic-workflows", "vllm"], "date": "2026-03", "date_read": "2026-04-18", "url": "papers/2603.16104.html", "core": "Helium reframes batch agentic LLM workflows as database query plans with LLMs as first-class operators, combining proactive KV/prompt caching, a Templated Radix Tree encoding both static prefix structure and operator dependencies, and a cos"}, {"id": "2604.03143", "title": "TokenDance: Scaling Multi-Agent LLM Serving via Collective KV Cache Sharing", "category": "framework", "tags": ["multi-agent-serving", "kv-cache-sharing", "position-independent-caching", "llm-inference", "agent-systems"], "date": "2026-04", "date_read": "2026-04-18", "url": "papers/2604.03143.html", "core": "Elevate KV cache reuse from per-request to per-round All-Gather collective, amortizing RoPE + important-position selection across N agents in one pass, and compressing sibling caches via Master + block-sparse diff storage for 11-17x compres"}, {"id": "2604.11378", "title": "From Agent Loops to Structured Graphs: A Scheduler-Theoretic Framework for LLM Agent Execution", "category": "agent", "tags": ["framework", "scheduling", "dag", "position-paper", "agent-runtime"], "date": "2026-04", "date_read": "2026-04-18", "url": "papers/2604.11378.html", "core": "Reframes LLM agent execution as a scheduler problem parameterized by ready-set cardinality |U| and policy explicitness, then proposes SGH (Structured Graph Harness)—a static-DAG runtime with plan-version immutability, three-layer separation"}, {"id": "2604.15186", "title": "Scepsy: Serving Agentic Workflows Using Aggregate LLM Pipelines", "category": "framework", "tags": ["agentic-workflow", "multi-LLM-serving", "GPU-scheduling", "fractional-GPU", "topology-aware-placement", "kubernetes"], "date": "2026-04", "date_read": "2026-04-18", "url": "papers/2604.15186.html", "core": "Scepsy introduces the Aggregate LLM Pipeline — an abstraction that exploits the empirical stability of each LLM's relative execution-time share across agentic workflow requests — to drive a joint (fractional-GPU, tensor-parallelism, replica"}, {"id": "2604.14148", "title": "Seedance 2.0: Advancing Video Generation for World Complexity", "category": "llm", "tags": ["video-generation", "audio-video-joint", "MMDiT", "diffusion-transformer", "multimodal", "evaluation-report"], "date": "2026-04", "date_read": "2026-04-18", "url": "papers/2604.14148.html", "core": "Seedance 2.0 is ByteDance's native multi-modal audio-video joint generation foundation model based on a dual-branch MMDiT architecture; supports 4 input modalities (text/image/video/audio) and 22 multi-modal tasks (20 supported, 7 exclusive"}, {"id": "2404.16811", "title": "Make Your LLM Fully Utilize the Context", "category": "algorithm", "tags": ["long-context", "lost-in-the-middle", "data-synthesis", "instruction-tuning", "RoPE", "evaluation"], "date": "2024-04", "date_read": "2026-04-19", "url": "papers/2404.16811.html", "core": "Proposes Information-Intensive (IN2) training: a purely data-driven SFT recipe that synthesises 1.75M long-context QA examples (4K-32K tokens) where the gold information is forced to occur at uniformly-random positions, producing FilM-7B wh"}, {"id": "2412.10079", "title": "Lost in the Middle, and In-Between: Enhancing Language Models' Ability to Reason Over Long Contexts in Multi-Hop QA", "category": "algorithm", "tags": ["long-context", "multi-hop-qa", "lost-in-the-middle", "RAG", "position-bias", "chain-of-thought"], "date": "2024-12", "date_read": "2026-04-19", "url": "papers/2412.10079.html", "core": "证明长上下文 LLM 的 lost-in-the-middle 现象在多跳 QA 中存在第二层退化——准确率不仅与证据离上下文边缘的距离有关，还与多个证据片段之间的相对距离有关；并系统评估 CoT、文档摘要、KG-triple 三类缓解方案，发现它们均不能同时解决位置偏置与绝对准确率两个目标。"}, {"id": "2502.05167", "title": "NoLiMa: Long-Context Evaluation Beyond Literal Matching", "category": "llm", "tags": ["long-context", "benchmark", "NIAH", "attention-mechanism", "RoPE", "evaluation"], "date": "2025-02", "date_read": "2026-04-19", "url": "papers/2502.05167.html", "core": "A long-context benchmark that strips literal/lexical overlap between question and needle (ROUGE-L precision ~0.07 vs ~0.86 in vanilla NIAH), revealing that all 13 frontier LLMs claiming 128K-1M context actually have effective length <= 8K ("}, {"id": "2506.08371", "title": "Mitigating Posterior Salience Attenuation in Long-Context LLMs with Positional Contrastive Decoding", "category": "algorithm", "tags": ["long-context", "decoding", "rope", "contrastive-decoding", "training-free", "llm-inference"], "date": "2025-06", "date_read": "2026-04-19", "url": "papers/2506.08371.html", "core": "提出 Positional Contrastive Decoding (PCD)：通过对 RoPE 低频分量做过旋转得到 local-aware logits 并与标准 logits 对比，training-free 地缓解长上下文中 gold token 的 Posterior Salience Attenuation 现象。"}, {"id": "2511.05850", "title": "Retrieval Quality at Context Limit", "category": "llm", "tags": ["long-context", "needle-in-a-haystack", "evaluation", "gemini", "lost-in-the-middle", "retrieval"], "date": "2025-11", "date_read": "2026-04-19", "url": "papers/2511.05850.html", "core": "Empirically demonstrates that the 'Lost in the Middle' U-shaped accuracy curve has been completely eliminated for single-needle factoid Q&A in Gemini 2.5 Flash up to its full ~1.05M-token context window — 26/26 questions correct at every te"}, {"id": "2601.15300", "title": "Intelligence Degradation in Long-Context LLMs: Critical Threshold Determination via Natural Length Distribution Analysis", "category": "llm", "tags": ["long-context", "evaluation", "RoPE", "attention-dispersion", "Qwen", "threshold-detection"], "date": "2026-01", "date_read": "2026-04-19", "url": "papers/2601.15300.html", "core": "Natural Length Distribution Analysis 评测方法学 + 5-method cross-validation, 在 Qwen2.5-7B 上量化 long-context cliff-like degradation, 临界点 Lc ≈ 43.2 % (≈ 55 296 tokens)，F1 从 0.556 跌到 0.302 (45.5 %)。"}, {"id": "2604.15039", "title": "Prefill-as-a-Service: KVCache of Next-Generation Models Could Go Cross-Datacenter", "category": "framework", "tags": ["pd-disaggregation", "kvcache", "hybrid-attenti   const d = document.createElement("div");
  d.className = "stat-card";
  d.innerHTML = `<div class="v">${v}</div><div class="l">${l}</div>`;
  return d;
}
statsEl.appendChild(statCard(DATA.stats.total_papers, "papers"));
statsEl.appendChild(statCard(DATA.stats.total_edges, "edges"));
statsEl.appendChild(statCard(DATA.stats.isolated, "isolated"));
const recentCount = DATA.nodes.filter(n => n.isNew).length;
statsEl.appendChild(statCard(recentCount, "recent"));

// --- Top connectors ---
const topListEl = document.getElementById("top-list");
DATA.stats.top_connectors.forEach(([pid, deg]) => {
  const p = byId.get(pid);
  if (!p) return;
  const a = document.createElement("a");
  a.href = "#";
  a.onclick = (e) => { e.preventDefault(); focusNode(pid); };
  a.innerHTML = `<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:220px;">${pid}</span><span class="cnt">${deg}</span>`;
  topListEl.appendChild(a);
});

document.getElementById("generated").textContent = `Generated ${DATA.generated_at} · D3 v7 force-directed`;

// --- Force simulation ---
const svg = d3.select("#viz");
const g = svg.append("g");

const sim = d3.forceSimulation(DATA.nodes)
  .force("link", d3.forceLink(DATA.links).id(d => d.id).distance(60).strength(0.8))
  .force("charge", d3.forceManyBody().strength(-110))
  .force("center", d3.forceCenter(0, 0))
  .force("collide", d3.forceCollide().radius(d => 4 + Math.sqrt(d.deg) * 2));

const link = g.append("g").attr("class", "links")
  .selectAll("line").data(DATA.links).join("line").attr("class", "link");

const node = g.append("g").attr("class", "nodes")
  .selectAll("g").data(DATA.nodes).join("g")
  .attr("class", d => "node" + (d.isNew ? " new" : ""))
  .call(d3.drag()
    .on("start", (event, d) => {
      if (!event.active) sim.alphaTarget(0.3).restart();
      d.fx = d.x; d.fy = d.y;
    })
    .on("drag", (event, d) => { d.fx = event.x; d.fy = event.y; })
    .on("end", (event, d) => {
      if (!event.active) sim.alphaTarget(0);
      d.fx = null; d.fy = null;
    }));

node.append("circle")
  .attr("r", d => 4 + Math.sqrt(d.deg) * 2)
  .attr("fill", d => DATA.cat_colors[d.category] || "#888")
  .on("mouseenter", (e, d) => showDetail(d, true))
  .on("click", (e, d) => focusNode(d.id))
  .on("dblclick", (e, d) => window.location.href = d.url);

const labels = node.append("text")
  .text(d => d.id)
  .style("display", "none");

sim.on("tick", () => {
  link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
  node.attr("transform", d => `translate(${d.x},${d.y})`);
});

// --- Zoom/pan ---
const zoom = d3.zoom().scaleExtent([0.2, 4])
  .on("zoom", (event) => g.attr("transform", event.transform));
svg.call(zoom);

function fit() {
  const w = svg.node().clientWidth;
  const h = svg.node().clientHeight;
  svg.attr("viewBox", [-w/2, -h/2, w, h]);
  sim.force("center", d3.forceCenter(0, 0));
  sim.alpha(0.5).restart();
}
window.addEventListener("resize", fit);
fit();

// --- Filters ---
function applyFilters() {
  const hideIso = document.getElementById("hide-isolated").checked;
  const showLbl = document.getElementById("show-labels").checked;
  const q = document.getElementById("search").value.trim().toLowerCase();
  const showNew = document.getElementById("highlight-new").checked;

  node.style("display", d => {
    if (!enabledCats.has(d.category)) return "none";
    if (hideIso && d.deg === 0) return "none";
    if (q) {
      const blob = (d.id + " " + d.title + " " + (d.tags||[]).join(" ")).toLowerCase();
      if (!blob.includes(q)) return "none";
    }
    return null;
  });
  link.style("display", l => {
    const a = byId.get(typeof l.source === "string" ? l.source : l.source.id);
    const b = byId.get(typeof l.target === "string" ? l.target : l.target.id);
    if (!a || !b) return "none";
    if (!enabledCats.has(a.category) || !enabledCats.has(b.category)) return "none";
    return null;
  });
  labels.style("display", showLbl ? null : "none");
  node.classed("new", d => showNew && d.isNew);
}
document.getElementById("hide-isolated").onchange = applyFilters;
document.getElementById("show-labels").onchange = applyFilters;
document.getElementById("highlight-new").onchange = applyFilters;
document.getElementById("search").oninput = applyFilters;

// --- Detail panel + focus ---
const detailEl = document.getElementById("detail");
function showDetail(d, hover) {
  const cat = d.category;
  const color = DATA.cat_colors[cat];
  const tags = (d.tags || []).map(t => `<span class="tag">${t}</span>`).join("");
  const neighbors = [...(adj.get(d.id) || [])].map(nid => byId.get(nid)).filter(Boolean);
  const neighborHtml = neighbors.length === 0 ? '<p class="subtle">No connections.</p>' :
    neighbors.map(n => `<a href="#" onclick="focusNode('${n.id}');return false;"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${DATA.cat_colors[n.category]};margin-right:6px;"></span>${n.id} · ${n.title.slice(0, 50)}</a>`).join("");

  detailEl.innerHTML = `
    <div class="pid">${d.id} · ${d.date || "?"}</div>
    <h3>${d.title}</h3>
    <span class="cat-pill" style="background:${color}">${DATA.cat_labels[cat]}</span>
    ${d.isNew ? '<span class="cat-pill" style="background:#f59e0b;margin-left:6px;">RECENT</span>' : ''}
    <div class="core">${d.core || ''}</div>
    <div class="tags">${tags}</div>
    <div class="related"><strong style="font-size:0.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.04em;">Connections (${neighbors.length})</strong>${neighborHtml}</div>
    <a class="open-btn" href="${d.url}">Open paper →</a>
  `;
}

function focusNode(pid) {
  const target = byId.get(pid);
  if (!target) return;
  showDetail(target, false);
  const neigh = adj.get(pid) || new Set();
  node.classed("hl", n => n.id === pid);
  node.classed("dim", n => n.id !== pid && !neigh.has(n.id));
  link.classed("hl", l => {
    const sId = typeof l.source === "string" ? l.source : l.source.id;
    const tId = typeof l.target === "string" ? l.target : l.target.id;
    return sId === pid || tId === pid;
  });
  link.classed("dim", l => {
    const sId = typeof l.source === "string" ? l.source : l.source.id;
    const tId = typeof l.target === "string" ? l.target : l.target.id;
    return sId !== pid && tId !== pid;
  });
}

svg.on("click", (e) => {
  if (e.target === svg.node() || e.target.tagName === "g") {
    node.classed("hl", false).classed("dim", false);
    link.classed("hl", false).classed("dim", false);
  }
});

applyFilters();
</script>
</body>
</html>
