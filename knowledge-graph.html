const categories = ["algorithm", "kernel", "framework", "model", "agent", "cluster", "hardware", "code"];
const colors = {"algorithm": "#059669", "kernel": "#d97706", "framework": "#2563eb", "model": "#7c3aed", "agent": "#dc2626", "cluster": "#0891b2", "hardware": "#4b5563", "code": "#64748b"};

const legendEl = document.getElementById('legend');
categories.forEach(c => {
  const n = data.nodes.filter(d => d.category === c).length;
  if (n === 0) return;
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = '<div class="legend-dot" style="background:' + colors[c] + '"></div>' + c + ' (' + n + ')';
  legendEl.appendChild(item);
});

const width = window.innerWidth;
const height = window.innerHeight - 52;
const svg = d3.select('#graph').append('svg').attr('width',width).attr('height',height);
const g = svg.append('g');
svg.call(d3.zoom().on('zoom', e => g.attr('transform', e.transform)));

const sim = d3.forceSimulation(data.nodes)
  .force('link', d3.forceLink(data.links).id(d=>d.id).distance(80))
  .force('charge', d3.forceManyBody().strength(-200))
  .force('center', d3.forceCenter(width/2, height/2))
  .force('collision', d3.forceCollide(20));

const link = g.append('g').selectAll('line').data(data.links).join('line')
  .attr('stroke','#ccc').attr('stroke-width',1);

const node = g.append('g').selectAll('circle').data(data.nodes).join('circle')
  .attr('r', d => d.has_l3 ? 8 : 5)
  .attr('fill', d => d.color)
  .attr('stroke', d => d.has_l3 ? '#333' : 'none')
  .attr('stroke-width', 1.5)
  .style('cursor','pointer')
  .call(d3.drag().on('start',(e,d)=>{if(!e.active)sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;}).on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y;}).on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}));

const label = g.append('g').selectAll('text').data(data.nodes).join('text')
  .text(d => d.id).attr('font-size',9).attr('dx',10).attr('dy',3)
  .attr('fill','#555');

const tooltip = d3.select('body').append('div').attr('class','tooltip').style('display','none');

node.on('mouseover', (e,d) => {
  tooltip.style('display','block')
    .html('<strong>'+d.title+'</strong><br>'+d.category+' | '+d.date)
    .style('left',(e.pageX+12)+'px').style('top',(e.pageY-20)+'px');
}).on('mouseout', () => tooltip.style('display','none'))
  .on('click', (e,d) => window.open('/papers/'+d.id+'/detail.html','_self'));

sim.on('tick', () => {
  link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  node.attr('cx',d=>d.x).attr('cy',d=>d.y);
  label.attr('x',d=>d.x).attr('y',d=>d.y);
});
</script>
